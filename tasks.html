<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; }
        .nav { display: flex; background: white; padding: 8px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; justify-content: space-around; }
        .nav a { padding: 10px 20px; border-radius: 12px; text-decoration: none; color: #6b7280; font-weight: 600; }
        .nav a:nth-child(2) { background: var(--primary); color: white; }
        .card { background: white; padding: 24px; border-radius: 24px; }
        input[type="date"] { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #e5e7eb; box-sizing: border-box; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .task-input { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; }
        .item { display: flex; align-items: center; padding: 12px; background: #f9fafb; border-radius: 12px; margin-bottom: 8px; gap: 10px; }
        .completed { text-decoration: line-through; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav"><a href="index.html">🏠 Home</a><a href="tasks.html">✅ Tasks</a><a href="study.html">📖 Study</a></nav>
        <div class="card">
            <input type="date" id="taskDate" onchange="render()">
            <div class="input-group">
                <input type="text" id="taskIn" class="task-input" placeholder="Add task...">
                <button class="add-btn" onclick="add()">Add</button>
            </div>
            <div id="list"></div>
        </div>
    </div>
    <script>
        document.getElementById('taskDate').valueAsDate = new Date();
        let db = JSON.parse(localStorage.getItem('shipon_tasks_db')) || {};

        function render() {
            const date = document.getElementById('taskDate').value;
            const list = document.getElementById('list');
            list.innerHTML = '';
            (db[date] || []).forEach((t, i) => {
                list.innerHTML += `<div class="item">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="tog('${date}',${i})">
                    <span class="${t.done ? 'completed' : ''}">${t.text}</span>
                </div>`;
            });
            localStorage.setItem('shipon_tasks_db', JSON.stringify(db));
        }

        function add() {
            const date = document.getElementById('taskDate').value;
            const val = document.getElementById('taskIn').value;
            if(!val) return;
            if(!db[date]) db[date] = [];
            db[date].push({text: val, done: false});
            document.getElementById('taskIn').value = '';
            render();
        }

        function tog(date, i) { db[date][i].done = !db[date][i].done; render(); }
        render();
    </script>
</body>
</html>
