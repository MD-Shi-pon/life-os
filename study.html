<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --study: #d97706; --bg: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; }
        .nav { display: flex; background: white; padding: 8px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; justify-content: space-around; }
        .nav a { padding: 10px 20px; border-radius: 12px; text-decoration: none; color: #6b7280; font-weight: 600; }
        .nav a:nth-child(3) { background: var(--primary); color: white; }
        .card { background: white; padding: 24px; border-radius: 24px; }
        input[type="date"], select, input[type="number"], button { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #e5e7eb; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--study); color: white; border: none; font-weight: 800; }
        .log-item { background: #fffbeb; padding: 15px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--study); }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav"><a href="index.html">🏠 Home</a><a href="tasks.html">✅ Tasks</a><a href="study.html">📖 Study</a></nav>
        <div class="card">
            <input type="date" id="studyDate" onchange="render()">
            <select id="sub"><option>English</option><option>Marketing</option></select>
            <input type="number" id="hrs" placeholder="Hours">
            <button onclick="add()">Log Session</button>
            <div id="logs"></div>
        </div>
    </div>
    <script>
        document.getElementById('studyDate').valueAsDate = new Date();
        let db = JSON.parse(localStorage.getItem('shipon_study_db')) || {};

        function render() {
            const date = document.getElementById('studyDate').value;
            const logs = document.getElementById('logs');
            logs.innerHTML = '';
            (db[date] || []).forEach(s => {
                logs.innerHTML += `<div class="log-item"><b>${s.subject}</b>: ${s.hours} hours</div>`;
            });
            localStorage.setItem('shipon_study_db', JSON.stringify(db));
        }

        function add() {
            const date = document.getElementById('studyDate').value;
            const h = parseFloat(document.getElementById('hrs').value);
            if(!h) return;
            if(!db[date]) db[date] = [];
            db[date].push({subject: document.getElementById('sub').value, hours: h});
            document.getElementById('hrs').value = '';
            render();
        }
        render();
    </script>
</body>
</html>
