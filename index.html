<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE | Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              dayLog: JSON.parse(localStorage.getItem('s_dayLog'))?.[date] || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("✅ Archive Synced to Cloud");
          } catch (e) { alert("Error: " + e.message); }
      };
    </script>

    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }

        .header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 0 20px; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .m3-card { background: var(--surface); border-radius: 28px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 4px; text-decoration-color: var(--s); opacity: 0.4; font-weight: 800; }

        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: rgba(128,128,128,0.05); color: inherit; margin: 8px 0; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; transition: 0.2s; }
        button:active { transform: scale(0.96); }

        /* Task List UI */
        .task-item { display: flex; align-items: center; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
        .task-text { flex: 1; margin-left: 15px; font-weight: 700; font-size: 1rem; }
        .del-icon { color: #ef4444; font-size: 0.7rem; font-weight: 800; cursor: pointer; padding: 5px; }
        
        /* 24H Planner UI */
        .log-entry { display: flex; align-items: flex-start; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .log-time { font-weight: 800; color: var(--p); font-size: 0.8rem; min-width: 90px; }
        .log-desc { font-weight: 500; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-weight:800; letter-spacing: -2px;">SHIPON'S LIFE</h1>
    </div>

    <div id="homeP" class="page active-page">
        <div class="m3-card" style="text-align: center; border-bottom: 5px solid var(--p);">
            <small style="text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; font-weight: 800;">Lifetime Study Hours</small>
            <div style="font-size: 4.5rem; font-weight: 900;" id="lifeH">0.0</div>
        </div>
        <div class="m3-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight: 800; opacity: 0.7;">Active Date</span>
                <input type="date" id="mainDate" onchange="refresh()" style="width: auto; border:none; color:var(--p); font-weight:800;">
            </div>
            <button onclick="backupToCloud()" style="background:var(--s); margin-top: 15px;">SYNC PROGRESS</button>
        </div>
    </div>

    <div id="statsP" class="page">
        <h1>Analytics Engine</h1>
        <div class="m3-card" style="height: 350px;"><canvas id="mainChart"></canvas></div>
        <div class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="date" id="dateA" onchange="updateChart()">
                <input type="date" id="dateB" onchange="updateChart()">
            </div>
            <p style="text-align:center; font-size:0.7rem; opacity:0.6;">Select two dates for Comparison Graph</p>
        </div>
    </div>

    <div id="tasksP" class="page">
        <h1>Daily Discipline</h1>
        <div class="m3-card">
            <input type="text" id="tIn" placeholder="Enter high-priority goal...">
            <button onclick="addT()">COMMIT TASK</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="dayLogP" class="page">
        <h1>24H Routine</h1>
        <div class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                <div><small>Start</small><input type="time" id="startTime"></div>
                <div><small>End</small><input type="time" id="endTime"></div>
            </div>
            <input type="text" id="logAct" placeholder="Activity (e.g. English Speaking)">
            <button onclick="addLog()">ADD TO TIMELINE</button>
        </div>
        <div id="logList" class="m3-card"></div>
    </div>

    <div id="studyP" class="page">
        <h1>Study Center</h1>
        <div class="m3-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Duration (Hours)" step="0.5">
            <button onclick="addS()">LOG SESSION</button>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <input type="text" id="newSub" placeholder="New Field Name...">
            <button onclick="addNewSub()" style="background:#475569">+ ADD SUBJECT</button>
        </div>
        <div id="sLog"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('dayLogP', this)">24H</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
    </nav>

    <script>
        let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let sDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let dLogDB = JSON.parse(localStorage.getItem('s_dayLog')) || {};
        let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            refresh();
        }

        function refresh() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            
            // 1. HOME: Sum only Study Hours
            let totalHours = 0;
            Object.values(sDB).forEach(dayEntries => {
                dayEntries.forEach(entry => totalHours += parseFloat(entry.hours));
            });
            document.getElementById('lifeH').innerText = totalHours.toFixed(1);

            // 2. Dropdowns
            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            subs.forEach(s => sel.innerHTML += `<option>${s}</option>`);

            renderT(date); renderS(date); renderLog(date); updateChart();
            localStorage.setItem('s_t', JSON.stringify(tDB));
            localStorage.setItem('s_s', JSON.stringify(sDB));
            localStorage.setItem('s_dayLog', JSON.stringify(dLogDB));
            localStorage.setItem('s_subs', JSON.stringify(subs));
        }

        // TASK LOGIC
        function addT() {
            const d = document.getElementById('mainDate').value; const v = document.getElementById('tIn').value;
            if(!v) return; if(!tDB[d]) tDB[d] = [];
            tDB[d].push({text: v, done: false}); document.getElementById('tIn').value = ''; refresh();
        }
        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (tDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="task-item">
                    <input type="checkbox" style="width:24px; height:24px;" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span class="task-text ${t.done?'motivation-line':''}">${t.text}</span>
                    <span onclick="delT('${d}',${i})" class="del-icon">DELETE</span>
                </div>`;
            });
        }
        function toggleT(d, i) { tDB[d][i].done = !tDB[d][i].done; refresh(); }
        function delT(d, i) { tDB[d].splice(i, 1); refresh(); }

        // 24H LOGIC
        function addLog() {
            const d = document.getElementById('mainDate').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const act = document.getElementById('logAct').value;
            if(!start || !end || !act) return;
            if(!dLogDB[d]) dLogDB[d] = [];
            dLogDB[d].push({start, end, act});
            dLogDB[d].sort((a,b) => a.start.localeCompare(b.start));
            document.getElementById('logAct').value = ''; refresh();
        }
        function renderLog(d) {
            const l = document.getElementById('logList'); l.innerHTML = '';
            const logs = dLogDB[d] || [];
            if(logs.length === 0) l.innerHTML = "<p style='text-align:center; opacity:0.5;'>No routine logged for this day.</p>";
            logs.forEach(item => {
                l.innerHTML += `<div class="log-entry">
                    <div class="log-time">${item.start} — ${item.end}</div>
                    <div class="log-desc">${item.act}</div>
                </div>`;
            });
        }

        // STUDY LOGIC
        function addS() {
            const d = document.getElementById('mainDate').value; const h = parseFloat(document.getElementById('sHr').value);
            const sub = document.getElementById('sSub').value;
            if(!h) return; if(!sDB[d]) sDB[d] = [];
            const ex = sDB[d].find(s => s.subject === sub);
            if(ex) ex.hours += h; else sDB[d].push({subject: sub, hours: h});
            document.getElementById('sHr').value = ''; refresh();
        }
        function renderS(d) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (sDB[d] || []).forEach(s => l.innerHTML += `<div class="task-item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }
        function addNewSub() { const v = document.getElementById('newSub').value; if(v && !subs.includes(v)) { subs.push(v); document.getElementById('newSub').value=''; refresh(); } }

        // CHART LOGIC
        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const dA = document.getElementById('dateA').value; const dB = document.getElementById('dateB').value;
            let labels = [], data = [];
            if(dA && dB) {
                labels = [dA, dB];
                let hA = 0; (sDB[dA]||[]).forEach(s => hA += s.hours);
                let hB = 0; (sDB[dB]||[]).forEach(s => hB += s.hours);
                data = [hA, hB];
            } else {
                for(let i=6; i>=0; i--) {
                    const d = new Date(); d.setDate(d.getDate()-i);
                    const s = d.toISOString().split('T')[0];
                    labels.push(d.toLocaleDateString([],{weekday:'short'}));
                    let h = 0; (sDB[s]||[]).forEach(x => h+=x.hours);
                    data.push(h);
                }
            }
            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, {
                type: 'bar', data: { labels, datasets: [{ label: 'Study Hours', data, backgroundColor: '#6366f1', borderRadius: 12 }] },
                options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
