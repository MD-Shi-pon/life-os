<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('s_l')) || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("✅ Cloud Sync Success");
          } catch (e) { alert("Sync Error: " + e.message); }
      };
    </script>

    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }

        .page { display: none; padding: 25px; max-width: 500px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .block-card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--p); margin-bottom: 15px; display: block; }
        
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; margin: 5px 0; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: inherit; margin: 8px 0; box-sizing: border-box; }
        
        .list-item { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; }
        .strikethrough { text-decoration: line-through; text-decoration-color: var(--s); text-decoration-thickness: 3px; opacity: 0.5; }

        .chip-group { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 16px; border-radius: 10px; background: rgba(128,128,128,0.2); font-size: 0.7rem; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--p); color: white; }
    </style>
</head>
<body>

    <div id="homeP" class="page active-page">
        <h2 style="margin:0">SHIPON'S LIFE</h2>
        <div class="block-card" style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:800; opacity:0.7;">System Date</span>
                <input type="date" id="mainDate" onchange="refresh()" style="width:auto; margin:0; padding:8px;">
            </div>
            <button onclick="backupToCloud()" style="background:var(--s); margin-top:15px;">Backup to Cloud</button>
        </div>
        <div class="block-card">
            <span class="section-title">Performance Score</span>
            <div style="font-size: 3rem; font-weight: 900;" id="perfScore">0%</div>
            <p style="font-size:0.7rem; opacity:0.6;">Weighted: (Tasks 50% + Study 50%)</p>
        </div>
    </div>

    <div id="tasksP" class="page">
        <span class="section-title">Daily Tasks</span>
        <div class="block-card">
            <input type="text" id="tIn" placeholder="Enter focus goal...">
            <button onclick="addT()">Commit Task</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="studyP" class="page">
        <span class="section-title">Study Mastery</span>
        <div class="block-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Hours" step="0.5">
            <button onclick="addS()">Log Progress</button>
        </div>
        <div id="sLog"></div>
        <hr style="opacity:0.1; margin:20px 0;">
        <span class="section-title">Subject Management</span>
        <div class="block-card">
            <input type="text" id="newSub" placeholder="New subject name...">
            <button onclick="addNewSub()">Add New Subject</button>
        </div>
        <div id="subManageList"></div>
    </div>

    <div id="statsP" class="page">
        <span class="section-title">Discipline Analytics</span>
        <div class="chip-group">
            <div class="chip active" onclick="setMode('day', this)">Daily</div>
            <div class="chip" onclick="setMode('week', this)">Weekly</div>
            <div class="chip" onclick="setMode('month', this)">Monthly</div>
            <div class="chip" onclick="setMode('year', this)">Yearly</div>
            <div class="chip" onclick="setMode('compare', this)" style="color:var(--a)">Comparison</div>
        </div>
        <div class="block-card" style="height: 300px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="vaultP" class="page">
        <span class="section-title">Resource Vault</span>
        <div class="block-card">
            <input type="text" id="lTitle" placeholder="Link Name">
            <input type="text" id="lUrl" placeholder="https://...">
            <button onclick="addL()" style="background:var(--s)">Save Link</button>
        </div>
        <div id="lList"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('vaultP', this)">Vault</div>
    </nav>

    <script>
        let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let sDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let lDB = JSON.parse(localStorage.getItem('s_l')) || [];
        let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];
        let chartMode = 'day';

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            refresh();
        }

        function refresh() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            
            // 1. Performance Calculation
            const dT = tDB[date] || []; const dS = sDB[date] || [];
            const tPct = dT.length ? (dT.filter(t => t.done).length / dT.length) * 100 : 0;
            let sHrs = 0; dS.forEach(s => sHrs += s.hours);
            const sPct = Math.min((sHrs / 4) * 100, 100);
            document.getElementById('perfScore').innerText = Math.round((tPct * 0.5) + (sPct * 0.5)) + "%";

            // 2. Dropdown Update
            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            subs.forEach(s => sel.innerHTML += `<option>${s}</option>`);

            renderT(date); renderS(date); renderL(); renderSubManager(); updateChart();
            localStorage.setItem('s_t', JSON.stringify(tDB));
            localStorage.setItem('s_s', JSON.stringify(sDB));
            localStorage.setItem('s_l', JSON.stringify(lDB));
            localStorage.setItem('s_subs', JSON.stringify(subs));
        }

        function setMode(m, el) {
            chartMode = m;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let labels = [], data = [];
            let count = chartMode === 'day' ? 7 : chartMode === 'week' ? 4 : chartMode === 'month' ? 12 : 5;
            
            for(let i=count-1; i>=0; i--) {
                const d = new Date();
                if(chartMode === 'day') d.setDate(d.getDate()-i);
                if(chartMode === 'month') d.setMonth(d.getMonth()-i);
                if(chartMode === 'year') d.setFullYear(d.getFullYear()-i);
                const s = d.toISOString().split('T')[0];
                labels.push(chartMode === 'day' ? d.toLocaleDateString([],{weekday:'short'}) : (chartMode === 'month' ? d.toLocaleDateString([],{month:'short'}) : d.getFullYear()));
                let h = 0; (sDB[s]||[]).forEach(x => h+=x.hours);
                data.push(h);
            }

            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Hours', data, backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function addT() {
            const d = document.getElementById('mainDate').value; const v = document.getElementById('tIn').value;
            if(!v) return; if(!tDB[d]) tDB[d] = [];
            tDB[d].push({text: v, done: false}); document.getElementById('tIn').value = ''; refresh();
        }

        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (tDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="list-item">
                    <input type="checkbox" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span style="flex:1; margin-left:10px;" class="${t.done?'strikethrough':''}">${t.text}</span>
                    <span onclick="delT('${d}',${i})" style="color:#ef4444; font-size:0.6rem;">DELETE</span>
                </div>`;
            });
        }
        function toggleT(d, i) { tDB[d][i].done = !tDB[d][i].done; refresh(); }
        function delT(d, i) { if(confirm("Clear this task?")) { tDB[d].splice(i, 1); refresh(); } }

        function addS() {
            const d = document.getElementById('mainDate').value; const h = parseFloat(document.getElementById('sHr').value);
            const sub = document.getElementById('sSub').value;
            if(!h) return; if(!sDB[d]) sDB[d] = [];
            const ex = sDB[d].find(s => s.subject === sub);
            if(ex) ex.hours += h; else sDB[d].push({subject: sub, hours: h});
            document.getElementById('sHr').value = ''; refresh();
        }

        function renderS(d) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (sDB[d] || []).forEach(s => l.innerHTML += `<div class="list-item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }

        function renderSubManager() {
            const l = document.getElementById('subManageList'); l.innerHTML = '';
            subs.forEach((s, i) => { l.innerHTML += `<div class="list-item"><span>${s}</span><span onclick="remSub(${i})" style="margin-left:auto; color:#ef4444; font-size:0.6rem;">REMOVE</span></div>`; });
        }
        function remSub(i) { if(confirm("Delete this subject?")) { subs.splice(i, 1); refresh(); } }
        function addNewSub() { const v = document.getElementById('newSub').value; if(v && !subs.includes(v)) { subs.push(v); document.getElementById('newSub').value=''; refresh(); } }

        function addL() {
            const t = document.getElementById('lTitle').value; const u = document.getElementById('lUrl').value;
            if(t && u) { lDB.push({t, u}); document.getElementById('lTitle').value=''; document.getElementById('lUrl').value=''; refresh(); }
        }
        function renderL() {
            const l = document.getElementById('lList'); l.innerHTML = '';
            lDB.forEach((link, i) => l.innerHTML += `<div class="list-item">
                <a href="${link.u}" target="_blank" style="color:var(--s);text-decoration:none;font-weight:800;flex:1;">🔗 ${link.t}</a>
                <span onclick="delL(${i})" style="color:#ef4444;font-size:0.6rem;">DELETE</span>
            </div>`);
        }
        function delL(i) { lDB.splice(i, 1); refresh(); }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
