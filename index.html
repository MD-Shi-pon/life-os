<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON | Life OS</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">

    <div class="theme-toggle" onclick="window.toggleTheme()">🌗</div>

    <main id="app-container">
        <section id="homeP" class="page active-page">
            <h1 class="glitch-text">LIFE OS</h1>
            <div class="glass-card main-stat">
                <small id="homeDay"></small>
                <div class="big-hour" id="lifeH">0.0</div>
                <p>TOTAL MASTERY HOURS</p>
            </div>
            <div class="glass-card">
                <input type="date" id="mainDate" onchange="window.refresh()">
                <button class="btn-sync" onclick="window.syncCurrent()">🔄 FORCE CLOUD SYNC</button>
            </div>
        </section>

        <section id="statsP" class="page">
            <h1>Analytics</h1>
            <div class="filter-row">
                <button onclick="window.updateChart('daily')">DAY</button>
                <button onclick="window.updateChart('weekly')">WEEK</button>
                <button onclick="window.updateChart('monthly')">MONTH</button>
            </div>
            <div class="glass-card chart-container"><canvas id="mainChart"></canvas></div>
            <div class="comparison-grid">
                <button class="btn-p" onclick="window.compareSubjects()">📊 SUBJECT SPLIT</button>
                <button class="btn-s" onclick="window.compareDates()">COMPARE DATES</button>
            </div>
        </section>

        <section id="tasksP" class="page">
            <div class="header-row"><h1>Mission</h1><input type="date" id="taskDate" onchange="window.refresh()"></div>
            <div class="glass-card input-group">
                <input type="text" id="tIn" placeholder="Enter objective...">
                <button onclick="window.addT()">ADD MISSION</button>
            </div>
            <div id="tList" class="scroll-list"></div>
        </section>

        <section id="dayLogP" class="page">
            <div class="header-row"><h1>Today</h1><input type="date" id="todayDate" onchange="window.refresh()"></div>
            <div class="glass-card input-group">
                <div class="time-row"><input type="time" id="startTime"><input type="time" id="endTime"></div>
                <input type="text" id="logAct" placeholder="What are you doing?">
                <button onclick="window.addLog()">LOG ROUTINE</button>
            </div>
            <div id="logList" class="scroll-list"></div>
        </section>

        <section id="studyP" class="page">
            <div class="header-row"><h1>Study</h1><input type="date" id="studyDate" onchange="window.refresh()"></div>
            
            <div class="sub-nav-bar">
                <button id="btnViewLog" onclick="window.setStudyView('log')" class="sub-nav-item active">LOG HOURS</button>
                <button id="btnViewManage" onclick="window.setStudyView('manage')" class="sub-nav-item">MANAGE FIELDS</button>
            </div>

            <div id="studyViewLog">
                <div class="glass-card input-group">
                    <select id="sSub"></select>
                    <input type="number" id="sHr" placeholder="Duration (Hours)" step="0.5">
                    <button onclick="window.addS()">SAVE PROGRESS</button>
                </div>
                <div id="sLog" class="scroll-list"></div>
            </div>

            <div id="studyViewManage" style="display:none;">
                <div class="glass-card input-group">
                    <input type="text" id="newSubIn" placeholder="New Career Field...">
                    <button class="btn-s" onclick="window.addNewSub()">+ CREATE SUBJECT</button>
                </div>
                <h3 class="section-title">Career Mastery Fields</h3>
                <div id="subManageList" class="scroll-list"></div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="window.nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="window.nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="window.nav('dayLogP', this)">Today</div>
        <div class="nav-item" onclick="window.nav('studyP', this)">Study</div>
    </nav>

    <script type="module" src="./app.js"></script>
</body>
</html>
