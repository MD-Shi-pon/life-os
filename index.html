<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE | Universal Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // UNIVERSAL SYNC: This connects Phone and Laptop
      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          
          // 1. PUSH current local data to Cloud
          const localData = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              dayLog: JSON.parse(localStorage.getItem('s_dayLog'))?.[date] || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), localData);
              
              // 2. PULL ALL history from Cloud to make Laptop & Mobile identical
              const querySnapshot = await getDocs(collection(db, "users", "shipon", "history"));
              let cloudStudyDB = JSON.parse(localStorage.getItem('s_s')) || {};
              let cloudTaskDB = JSON.parse(localStorage.getItem('s_t')) || {};
              let cloudLogDB = JSON.parse(localStorage.getItem('s_dayLog')) || {};

              querySnapshot.forEach((doc) => {
                  const data = doc.data();
                  cloudStudyDB[doc.id] = data.study;
                  cloudTaskDB[doc.id] = data.tasks;
                  cloudLogDB[doc.id] = data.dayLog;
              });

              localStorage.setItem('s_s', JSON.stringify(cloudStudyDB));
              localStorage.setItem('s_t', JSON.stringify(cloudTaskDB));
              localStorage.setItem('s_dayLog', JSON.stringify(cloudLogDB));
              
              window.refresh();
              alert("🚀 Device Synchronized! Laptop & Mobile now match.");
          } catch (e) { alert("Sync Error: " + e.message); }
      };
    </script>

    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }
        .header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 0 20px; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .m3-card { background: var(--surface); border-radius: 28px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); }
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 4px; text-decoration-color: var(--s); opacity: 0.4; font-weight: 800; }
        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: rgba(128,128,128,0.05); color: inherit; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; transition: 0.2s; }
        .task-item { display: flex; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border); }
        .log-entry { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body class="dark-mode">

    <div class="header">
        <h1 style="margin:0; font-weight:800;">SHIPON'S LIFE</h1>
    </div>

    <div id="homeP" class="page active-page">
        <div class="m3-card" style="text-align: center; border-left: 5px solid var(--p);">
            <small style="text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-weight: 800;">Universal Lifetime Mastery</small>
            <div style="font-size: 4rem; font-weight: 900;" id="lifeH">0.0h</div>
        </div>
        <div class="m3-card">
            <input type="date" id="mainDate" onchange="refresh()" style="border:none; color:var(--p); font-weight:800;">
            <button onclick="backupToCloud()" style="background:var(--s); margin-top: 15px;">🔄 SYNC ACROSS DEVICES</button>
        </div>
    </div>

    <div id="statsP" class="page"><h1>Analytics</h1><div class="m3-card" style="height: 350px;"><canvas id="mainChart"></canvas></div></div>
    <div id="tasksP" class="page"><h1>Tasks</h1><div class="m3-card"><input type="text" id="tIn" placeholder="New goal..."><button onclick="addT()">ADD</button></div><div id="tList"></div></div>
    <div id="dayLogP" class="page"><h1>24H Routine</h1><div class="m3-card"><input type="time" id="startTime"><input type="time" id="endTime"><input type="text" id="logAct" placeholder="Activity..."><button onclick="addLog()">ADD</button></div><div id="logList"></div></div>
    <div id="studyP" class="page"><h1>Study Center</h1><div class="m3-card"><select id="sSub"></select><input type="number" id="sHr" placeholder="Hours"><button onclick="addS()">SAVE</button></div><div id="sLog"></div></div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('dayLogP', this)">24H</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
    </nav>

    <script>
        // Global refresh function
        window.refresh = function() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            let sDB = JSON.parse(localStorage.getItem('s_s')) || {};
            let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
            let dLogDB = JSON.parse(localStorage.getItem('s_dayLog')) || {};
            let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];

            // Recalculate Lifetime Mastery from merged DB
            let total = 0;
            Object.values(sDB).forEach(day => day.forEach(entry => total += parseFloat(entry.hours)));
            document.getElementById('lifeH').innerText = total.toFixed(1) + "h";

            // Render logic...
            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            subs.forEach(s => sel.innerHTML += `<option>${s}</option>`);
            renderT(date, tDB); renderS(date, sDB); renderLog(date, dLogDB);
        };

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            window.refresh();
        }

        // Logic for Tasks, Study, and 24H entries...
        function addT() {
            let d = document.getElementById('mainDate').value; let v = document.getElementById('tIn').value;
            let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
            if(!tDB[d]) tDB[d] = []; tDB[d].push({text: v, done: false});
            localStorage.setItem('s_t', JSON.stringify(tDB)); document.getElementById('tIn').value = ''; window.refresh();
        }
        function renderT(d, db) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (db[d] || []).forEach((t, i) => { l.innerHTML += `<div class="task-item"><input type="checkbox" ${t.done?'checked':''} onchange="toggleT('${d}',${i})"><span style="flex:1; margin-left:15px;" class="${t.done?'motivation-line':''}">${t.text}</span></div>`; });
        }
        function toggleT(d, i) { let db = JSON.parse(localStorage.getItem('s_t')); db[d][i].done = !db[d][i].done; localStorage.setItem('s_t', JSON.stringify(db)); window.refresh(); }
        
        function addS() {
            let d = document.getElementById('mainDate').value; let h = parseFloat(document.getElementById('sHr').value);
            let sDB = JSON.parse(localStorage.getItem('s_s')) || {}; let sub = document.getElementById('sSub').value;
            if(!sDB[d]) sDB[d] = []; let ex = sDB[d].find(x => x.subject === sub);
            if(ex) ex.hours += h; else sDB[d].push({subject: sub, hours: h});
            localStorage.setItem('s_s', JSON.stringify(sDB)); window.refresh();
        }
        function renderS(d, db) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (db[d] || []).forEach(s => l.innerHTML += `<div class="task-item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }

        function addLog() {
            let d = document.getElementById('mainDate').value; let s = document.getElementById('startTime').value;
            let e = document.getElementById('endTime').value; let a = document.getElementById('logAct').value;
            let db = JSON.parse(localStorage.getItem('s_dayLog')) || {};
            if(!db[d]) db[d] = []; db[d].push({start: s, end: e, act: a});
            localStorage.setItem('s_dayLog', JSON.stringify(db)); window.refresh();
        }
        function renderLog(d, db) {
            const l = document.getElementById('logList'); l.innerHTML = '';
            (db[d] || []).forEach(item => { l.innerHTML += `<div class="log-entry"><div style="font-weight:800; color:var(--p); min-width:100px;">${item.start}-${item.end}</div><div>${item.act}</div></div>`; });
        }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = window.refresh;
    </script>
</body>
</html>
