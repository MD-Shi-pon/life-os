<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIPON's Life | Pro Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('s_l')) || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English (IELTS)", "Digital Marketing"]
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("🚀 Data Securely Synced");
          } catch (e) { alert("Sync Error: " + e.message); }
      };
    </script>

    <style>
        :root { 
            --p: #6366f1; --s: #10b981; --a: #f59e0b; 
            --bg: #020617; --card: rgba(15, 23, 42, 0.8); --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }
        .light-mode { 
            --bg: #f8fafc; --card: rgba(255, 255, 255, 0.9); --text: #0f172a;
            --border: rgba(15, 23, 42, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); 
            min-height: 100vh; transition: 0.3s; padding-top: 80px;
        }

        /* Pro Navigation Header */
        header {
            position: fixed; top: 0; width: 100%; height: 70px; background: var(--card);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; box-sizing: border-box; z-index: 2000;
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; color: var(--p); }
        .nav-group { display: flex; gap: 20px; }
        .nav-btn { cursor: pointer; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; transition: 0.2s; }
        .nav-btn.active { color: var(--text); border-bottom: 2px solid var(--p); padding-bottom: 5px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Motivational Strikethrough */
        .completed-text { text-decoration: line-through; text-decoration-thickness: 3px; text-decoration-color: var(--s); opacity: 0.5; font-style: italic; transition: 0.3s; }

        .btn-p { background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(128,128,128,0.05); color: inherit; margin: 8px 0; outline: none; }
        
        /* Analytics Tabs */
        .chart-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .c-tab { flex: 1; padding: 10px; font-size: 0.65rem; font-weight: 800; border-radius: 10px; border: 1px solid var(--border); text-align: center; cursor: pointer; color: #94a3b8; }
        .c-tab.active { background: var(--p); color: white; border: none; }
        
        .timer-val { font-size: 3rem; font-weight: 900; color: var(--a); margin: 10px 0; }
        .item { padding: 15px; background: rgba(128,128,128,0.05); border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; border-left: 5px solid var(--p); }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHIPON'S LIFE</div>
        <div class="nav-group">
            <div class="nav-btn active" onclick="nav('homeP', this)">Home</div>
            <div class="nav-btn" onclick="nav('statsP', this)">Stats</div>
            <div class="nav-btn" onclick="nav('tasksP', this)">Tasks</div>
            <div class="nav-btn" onclick="nav('studyP', this)">Study</div>
        </div>
        <div onclick="toggleMode()" style="cursor:pointer; font-size:1.2rem;">🌗</div>
    </header>

    <div id="homeP" class="page active-page">
        <div class="glass-card" style="text-align: center; border-color: var(--a);">
            <small style="text-transform: uppercase; letter-spacing: 2px; color: var(--a); font-weight: 800;">Lifetime Mastery</small>
            <div style="font-size: 3.5rem; font-weight: 900;" id="lifeH">0.0h</div>
        </div>
        <div class="glass-card">
            <input type="date" id="mainDate" onchange="refresh()">
            <button onclick="backupToCloud()" class="btn-p" style="background:var(--s)">SYNC PROGRESS</button>
        </div>
        <div class="glass-card">
            <h3 style="margin-top:0">Today's Focus</h3>
            <div id="quickList"></div>
        </div>
    </div>

    <div id="statsP" class="page">
        <h1>Performance Analytics</h1>
        <div class="chart-tabs">
            <div class="c-tab active" onclick="changeChart('day', this)">Daily</div>
            <div class="c-tab" onclick="changeChart('week', this)">Weekly</div>
            <div class="c-tab" onclick="changeChart('month', this)">Monthly</div>
            <div class="c-tab" onclick="changeChart('year', this)">Yearly</div>
        </div>
        <div class="glass-card" style="height: 350px;">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div id="tasksP" class="page">
        <h1>Focus Goals</h1>
        <div class="glass-card">
            <input type="text" id="tIn" placeholder="Enter high-priority goal...">
            <button onclick="addT()" class="btn-p">Log Goal</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="studyP" class="page">
        <h1>Deep Study Center</h1>
        <div class="glass-card" style="text-align: center;">
            <input type="number" id="customTime" value="25" style="width: 50px; text-align: center; background: none; color: inherit; border: none; font-weight: 800;"> min
            <div class="timer-val" id="timer">25:00</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="startTimer()" style="background:var(--a); color:black; font-weight:800; border-radius:12px; padding:10px; width:100%;">START</button>
                <button onclick="resetTimer()" style="background:#475569; color:white; border-radius:12px; padding:10px; width:100%;">RESET</button>
            </div>
        </div>
        <div class="glass-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Manual Hours" step="0.5">
            <button onclick="addS()" class="btn-p">Complete Session</button>
            <hr style="opacity: 0.1; margin: 15px 0;">
            <input type="text" id="newSubIn" placeholder="New Field (e.g. Graphic Design)">
            <button onclick="addNewSub()" style="background:#475569; font-size:0.7rem;">+ ADD FIELD</button>
        </div>
    </div>

    <script>
        let taskDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let studyDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English (IELTS)", "Digital Marketing"];
        let chartType = 'day';
        let timerInt;

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            refresh();
        }

        function toggleMode() { document.body.classList.toggle('light-mode'); }

        function refresh() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            let tL = 0; Object.values(studyDB).forEach(day => day.forEach(s => tL += s.hours));
            document.getElementById('lifeH').innerText = tL.toFixed(1) + "h";

            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            subs.forEach(s => sel.innerHTML += `<option>${s}</option>`);

            renderT(date);
            updateCharts();
            localStorage.setItem('s_t', JSON.stringify(taskDB));
            localStorage.setItem('s_s', JSON.stringify(studyDB));
            localStorage.setItem('s_subs', JSON.stringify(subs));
        }

        function addT() {
            const d = document.getElementById('mainDate').value;
            const v = document.getElementById('tIn').value;
            if(!v) return;
            if(!taskDB[d]) taskDB[d] = [];
            taskDB[d].push({text: v, done: false});
            document.getElementById('tIn').value = ''; refresh();
        }

        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            const q = document.getElementById('quickList'); q.innerHTML = '';
            (taskDB[d] || []).forEach((t, i) => {
                const html = `<div class="item">
                    <input type="checkbox" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span class="${t.done?'completed-text':''}">${t.text}</span>
                </div>`;
                l.innerHTML += html;
                if(!t.done) q.innerHTML += html;
            });
        }

        function toggleT(d, i) { taskDB[d][i].done = !taskDB[d][i].done; refresh(); }

        function addNewSub() {
            const v = document.getElementById('newSubIn').value;
            if(v && !subs.includes(v)) { subs.push(v); document.getElementById('newSubIn').value=''; refresh(); }
        }

        function addS() {
            const d = document.getElementById('mainDate').value;
            const h = parseFloat(document.getElementById('sHr').value);
            if(!h) return;
            if(!studyDB[d]) studyDB[d] = [];
            studyDB[d].push({subject: document.getElementById('sSub').value, hours: h});
            document.getElementById('sHr').value = ''; refresh();
        }

        function changeChart(type, el) {
            chartType = type;
            document.querySelectorAll('.c-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            updateCharts();
        }

        function updateCharts() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let labels = [], data = [];
            const count = chartType === 'day' ? 7 : chartType === 'week' ? 4 : chartType === 'month' ? 12 : 5;

            for(let i=count-1; i>=0; i--) {
                const d = new Date();
                if(chartType === 'day') d.setDate(d.getDate()-i);
                if(chartType === 'week') d.setDate(d.getDate()-(i*7));
                
                const s = d.toISOString().split('T')[0];
                labels.push(chartType === 'day' ? d.toLocaleDateString([],{weekday:'short'}) : s);
                
                let h = 0;
                if(chartType === 'day') (studyDB[s]||[]).forEach(x => h+=x.hours);
                else {
                    // Logic for aggregation (weekly/monthly) would go here
                    (studyDB[s]||[]).forEach(x => h+=x.hours);
                }
                data.push(h);
            }

            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Hours', data, backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
        }

        function startTimer() {
            clearInterval(timerInt);
            let t = (parseInt(document.getElementById('customTime').value) || 25) * 60;
            timerInt = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(t-- <= 0) { clearInterval(timerInt); new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); alert("Focus Done!"); }
            }, 1000);
        }

        function resetTimer() { clearInterval(timerInt); document.getElementById('timer').innerText = "25:00"; }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
