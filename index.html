<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIPON'S LIFE</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0f172a">

  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<header class="app-header">
  <h1>SHIPON'S LIFE</h1>
  <p id="todayDate"></p>
</header>

<main>

<section id="home" class="tab active">
  <h2>Lifetime Mastery</h2>
  <div class="card">
    <span>Total Study Hours</span>
    <h3 id="lifetimeHours">0</h3>
  </div>
</section>

<section id="tasks" class="tab">
  <h2>Tasks</h2>
  <div class="row">
    <input type="text" id="taskInput" placeholder="New Task">
    <button id="addTask">Add</button>
  </div>
  <ul id="taskList"></ul>
</section>

<section id="study" class="tab">
  <h2>Study</h2>
  <div class="row">
    <input type="text" id="subjectInput" placeholder="Subject">
    <input type="number" id="hoursInput" placeholder="Hours" step="0.25">
    <button id="addStudy">Add</button>
  </div>
  <ul id="studyList"></ul>
</section>

</main>

<nav class="bottom-nav">
  <button data-tab="home">Home</button>
  <button data-tab="tasks">Tasks</button>
  <button data-tab="study">Study</button>
</nav>

<script type="module" src="app.js"></script>

</body>
</html>
