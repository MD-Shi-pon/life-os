<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON's Life | Android Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('s_l')) || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English (IELTS)", "Digital Marketing"]
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("✅ Synced to Google Cloud");
          } catch (e) { alert("Sync Error: " + e.message); }
      };
    </script>

    <style>
        :root { 
            --p: #6750A4; --s: #006A60; --a: #916F00; 
            --bg: #1C1B1F; --surface: #2B2930; --text: #E6E1E5;
            --outline: #938F99;
        }
        .light-mode { 
            --bg: #FFFBFE; --surface: #F3EDF7; --text: #1C1B1F;
            --outline: #79747E;
        }

        body { 
            font-family: 'Roboto', sans-serif; margin: 0; background: var(--bg); color: var(--text); 
            min-height: 100vh; padding-bottom: 90px; transition: 0.3s;
        }

        /* Android Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--surface);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--outline); z-index: 1000;
        }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: var(--outline); font-size: 0.75rem; font-weight: 700; }
        .nav-item.active { color: var(--p); }
        .nav-item.active .icon-bg { background: #D0BCFF; color: #381E72; padding: 4px 20px; border-radius: 16px; margin-bottom: 4px; display: inline-block; }

        .header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 0 20px; animation: androidFade 0.3s ease-out; }
        .active-page { display: block; }
        @keyframes androidFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .m3-card { background: var(--surface); border-radius: 28px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--outline); }
        
        /* The Motivation Line */
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 4px; text-decoration-color: #B3261E; opacity: 0.5; font-weight: 900; }

        button { width: 100%; padding: 16px; border-radius: 100px; border: none; font-weight: 700; cursor: pointer; background: var(--p); color: white; margin-top: 10px; }
        input, select { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--outline); background: transparent; color: inherit; margin: 8px 0; }
        
        /* Analytics Toggle */
        .chip-group { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--outline); font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--p); color: white; border-color: var(--p); }

        .timer { font-size: 4rem; font-weight: 900; color: var(--a); text-align: center; }
        .list-item { display: flex; align-items: center; padding: 16px; background: rgba(128,128,128,0.1); border-radius: 16px; margin-bottom: 8px; }
    </style>
</head>
<body class="dark-mode">

    <div class="header">
        <h2 style="margin:0; font-weight:900;">SHIPON'S LIFE</h2>
        <div onclick="toggleMode()" style="font-size:1.5rem;">🌗</div>
    </div>

    <div id="homeP" class="page active-page">
        <div class="m3-card" style="text-align: center; background: #381E72; color: #D0BCFF;">
            <small style="text-transform: uppercase; letter-spacing: 2px;">Lifetime Hours</small>
            <div style="font-size: 4.5rem; font-weight: 900;" id="lifeH">0.0h</div>
        </div>
        <div class="m3-card">
            <input type="date" id="mainDate" onchange="refresh()">
            <button onclick="backupToCloud()" style="background:var(--s)">SYNC PROGRESS</button>
        </div>
    </div>

    <div id="statsP" class="page">
        <div class="chip-group">
            <div class="chip active" onclick="setChart('day', this)">Daily</div>
            <div class="chip" onclick="setChart('week', this)">Weekly</div>
            <div class="chip" onclick="setChart('month', this)">Monthly</div>
            <div class="chip" onclick="setChart('year', this)">Yearly</div>
        </div>
        <div class="m3-card" style="height: 300px;"><canvas id="mainChart"></canvas></div>
        
        <h3>Progress Comparison</h3>
        <div class="m3-card" style="height: 250px;"><canvas id="compareChart"></canvas></div>
    </div>

    <div id="tasksP" class="page">
        <div class="m3-card">
            <input type="text" id="tIn" placeholder="New priority goal...">
            <button onclick="addT()">ADD GOAL</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="studyP" class="page">
        <div class="m3-card">
            <div class="timer" id="timer">25:00</div>
            <div style="display:flex; gap:10px;">
                <button onclick="startTimer()" style="background:var(--a)">START</button>
                <button onclick="resetTimer()" style="background:grey">RESET</button>
            </div>
        </div>
        <div class="m3-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Manual Log (Hours)">
            <button onclick="addS()">LOG SESSION</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)"><div class="icon-bg">Home</div></div>
        <div class="nav-item" onclick="nav('statsP', this)"><div class="icon-bg">Stats</div></div>
        <div class="nav-item" onclick="nav('tasksP', this)"><div class="icon-bg">Tasks</div></div>
        <div class="nav-item" onclick="nav('studyP', this)"><div class="icon-bg">Study</div></div>
    </nav>

    <script>
        let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let sDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English (IELTS)", "Digital Marketing"];
        let chartMode = 'day';
        let timerInt;

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            refresh();
        }

        function toggleMode() { document.body.classList.toggle('light-mode'); }

        function refresh() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            let tL = 0; Object.values(sDB).forEach(day => day.forEach(s => tL += s.hours));
            document.getElementById('lifeH').innerText = tL.toFixed(1) + "h";

            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            subs.forEach(s => sel.innerHTML += `<option>${s}</option>`);

            renderT(date); updateChart(); updateCompareChart();
            localStorage.setItem('s_t', JSON.stringify(tDB));
            localStorage.setItem('s_s', JSON.stringify(sDB));
        }

        function setChart(m, el) {
            chartMode = m;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let labels = [], data = [];
            let iterations = chartMode === 'day' ? 7 : chartMode === 'week' ? 4 : chartMode === 'month' ? 12 : 5;

            for(let i=iterations-1; i>=0; i--) {
                const d = new Date();
                if(chartMode === 'day') d.setDate(d.getDate()-i);
                if(chartMode === 'year') d.setFullYear(d.getFullYear()-i);
                
                const s = d.toISOString().split('T')[0];
                labels.push(chartMode === 'day' ? d.toLocaleDateString([],{weekday:'short'}) : d.getFullYear());
                let h = 0; (sDB[s]||[]).forEach(x => h+=x.hours);
                data.push(h);
            }

            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Hours', data, backgroundColor: '#D0BCFF', borderRadius: 10 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function updateCompareChart() {
            const ctx = document.getElementById('compareChart').getContext('2d');
            // Comparing last 2 weeks logic
            const labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const thisWeek = [2, 4, 3, 5, 2, 0, 0]; // Sample logic
            const lastWeek = [1, 3, 2, 4, 1, 1, 2];

            if(window.compO) window.compO.destroy();
            window.compO = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels, 
                    datasets: [
                        { label: 'Current', data: thisWeek, borderColor: '#D0BCFF', tension: 0.4 },
                        { label: 'Previous', data: lastWeek, borderColor: '#938F99', tension: 0.4, borderDash: [5, 5] }
                    ]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function addT() {
            const d = document.getElementById('mainDate').value; const v = document.getElementById('tIn').value;
            if(!v) return; if(!tDB[d]) tDB[d] = [];
            tDB[d].push({text: v, done: false}); document.getElementById('tIn').value = ''; refresh();
        }

        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (tDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="list-item">
                    <input type="checkbox" style="width:24px; height:24px;" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span style="margin-left:15px; font-size:1.1rem;" class="${t.done?'motivation-line':''}">${t.text}</span>
                </div>`;
            });
        }
        function toggleT(d, i) { tDB[d][i].done = !tDB[d][i].done; refresh(); }

        function startTimer() {
            clearInterval(timerInt);
            let t = 25 * 60;
            timerInt = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(t-- <= 0) { clearInterval(timerInt); alert("Focus Done!"); }
            }, 1000);
        }
        function resetTimer() { clearInterval(timerInt); document.getElementById('timer').innerText = "25:00"; }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
