<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE | Glass OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc, getDocs, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.syncData = async (date) => {
          const localData = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              dayLog: JSON.parse(localStorage.getItem('s_dayLog'))?.[date] || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          try { await setDoc(doc(db, "global_master", "history", "dates", date), localData); } 
          catch (e) { console.error("Sync Error", e); }
      };

      onSnapshot(collection(db, "global_master", "history", "dates"), (snap) => {
          let s_s = {}, s_t = {}, s_d = {};
          snap.forEach(d => {
              const data = d.data();
              s_s[d.id] = data.study || [];
              s_t[d.id] = data.tasks || [];
              s_d[d.id] = data.dayLog || [];
          });
          localStorage.setItem('s_s', JSON.stringify(s_s));
          localStorage.setItem('s_t', JSON.stringify(s_t));
          localStorage.setItem('s_dayLog', JSON.stringify(s_d));
          window.refresh();
      });
    </script>

    <style>
        :root { 
            --p: #6366f1; --s: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); --glass: blur(12px);
        }
        .light-mode { 
            --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.6); 
            --text: #0f172a; --border: rgba(0, 0, 0, 0.1); 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); 
            color: var(--text); padding-bottom: 90px; transition: 0.4s ease;
            background-image: radial-gradient(circle at top right, var(--p), transparent 400px);
            min-height: 100vh;
        }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); backdrop-filter: var(--glass); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }

        .page { display: none; padding: 25px; max-width: 500px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: var(--card); backdrop-filter: var(--glass); border-radius: 28px; padding: 22px; margin-bottom: 16px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border); background: rgba(128,128,128,0.1); color: inherit; margin: 8px 0; font-family: inherit; }
        button { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; margin-top: 8px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        
        .list-item { display: flex; align-items: center; padding: 16px; background: rgba(128,128,128,0.05); border-radius: 20px; margin-bottom: 10px; border-left: 5px solid var(--p); }
        .item-label { flex: 1; margin-left: 12px; font-weight: 700; font-size: 0.95rem; text-align: left; }
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 3px; text-decoration-color: var(--s); opacity: 0.4; }
        .del-btn { color: #ef4444; font-size: 0.65rem; font-weight: 800; cursor: pointer; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; z-index: 10; }
    </style>
</head>
<body class="dark-mode">

    <div class="theme-toggle" onclick="toggleTheme()">🌗</div>

    <div id="homeP" class="page active-page">
        <h1 style="margin:0; font-weight:800; letter-spacing: -2px;">SHIPON'S LIFE</h1>
        <div class="glass-card" style="text-align: center; border-left: 8px solid var(--p); margin-top: 20px;">
            <small id="homeDay" style="text-transform: uppercase; font-weight: 800; color: var(--p); letter-spacing: 1px;"></small>
            <div style="font-size: 4rem; font-weight: 900;" id="lifeH">0.0</div>
            <small style="opacity: 0.6; font-weight: 700;">Lifetime Study Hours</small>
        </div>
        <div class="glass-card">
            <input type="date" id="mainDate" onchange="window.refresh()">
            <button onclick="window.syncData(document.getElementById('mainDate').value)" style="background:var(--s);">🔄 CLOUD SYNC</button>
        </div>
    </div>

    <div id="statsP" class="page">
        <h1>Analytics</h1>
        <div class="glass-card" style="height: 300px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="tasksP" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Mission</h1>
            <input type="date" id="taskDate" onchange="window.refresh()" style="width: auto; padding: 5px 10px; background: var(--p); border: none;">
        </div>
        <div class="glass-card"><input type="text" id="tIn" placeholder="Commit..."><button onclick="addT()">ADD</button></div>
        <div id="tList"></div>
    </div>

    <div id="dayLogP" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Today</h1>
            <input type="date" id="todayDate" onchange="window.refresh()" style="width: auto; padding: 5px 10px; background: var(--s); border: none;">
        </div>
        <div class="glass-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="time" id="startTime"><input type="time" id="endTime">
            </div>
            <input type="text" id="logAct" placeholder="Activity..."><button onclick="addLog()">LOG</button>
        </div>
        <div id="logList"></div>
    </div>

    <div id="studyP" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Study</h1>
            <input type="date" id="studyDate" onchange="window.refresh()" style="width: auto; padding: 5px 10px; background: var(--p); border: none;">
        </div>
        <div class="glass-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Hours" step="0.5">
            <button onclick="addS()">SAVE PROGRESS</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <input type="text" id="newSubIn" placeholder="New Field...">
            <button onclick="addNewSub()" style="background:#475569">+ ADD SUBJECT</button>
        </div>
        <div id="sLog"></div>
        <h3 style="margin-top:20px;">Manage Fields</h3>
        <div id="subManageList"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('dayLogP', this)">Today</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
    </nav>

    <script>
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function format12(t) {
            if(!t) return ""; let [h, m] = t.split(':');
            let a = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            return `${h}:${m} ${a}`;
        }

        window.refresh = function() {
            const mDate = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            const tDate = document.getElementById('taskDate').value;
            const lDate = document.getElementById('todayDate').value;
            const sDate = document.getElementById('studyDate').value;

            document.getElementById('homeDay').innerText = new Date(mDate).toLocaleDateString('en-US', { weekday: 'long' });

            const sDB = JSON.parse(localStorage.getItem('s_s')) || {};
            const tDB = JSON.parse(localStorage.getItem('s_t')) || {};
            const dLogDB = JSON.parse(localStorage.getItem('s_dayLog')) || {};
            const subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];

            let total = 0; Object.values(sDB).forEach(day => (day || []).forEach(e => total += parseFloat(e.hours || 0)));
            document.getElementById('lifeH').innerText = total.toFixed(1);

            const sSel = document.getElementById('sSub'); sSel.innerHTML = '';
            subs.forEach(s => sSel.innerHTML += `<option>${s}</option>`);

            renderT(tDate, tDB); renderS(sDate, sDB); renderLog(lDate, dLogDB); renderSubM(subs);
            updateChart(sDB);
        };

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active'); window.refresh();
        }

        function addT() {
            let d = document.getElementById('taskDate').value, v = document.getElementById('tIn').value;
            if(!v) return; let db = JSON.parse(localStorage.getItem('s_t')) || {};
            if(!db[d]) db[d] = []; db[d].push({text: v, done: false});
            localStorage.setItem('s_t', JSON.stringify(db)); window.syncData(d); document.getElementById('tIn').value='';
        }
        function renderT(d, db) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (db[d] || []).forEach((t, i) => { l.innerHTML += `<div class="list-item"><input type="checkbox" ${t.done?'checked':''} onchange="toggleT('${d}',${i})"><span class="item-label ${t.done?'motivation-line':''}">${t.text}</span><span onclick="delT('${d}',${i})" class="del-btn">DEL</span></div>`; });
        }
        function toggleT(d, i) { let db = JSON.parse(localStorage.getItem('s_t')); db[d][i].done = !db[d][i].done; localStorage.setItem('s_t', JSON.stringify(db)); window.syncData(d); }
        function delT(d, i) { let db = JSON.parse(localStorage.getItem('s_t')); db[d].splice(i, 1); localStorage.setItem('s_t', JSON.stringify(db)); window.syncData(d); }

        function addS() {
            let d = document.getElementById('studyDate').value, h = parseFloat(document.getElementById('sHr').value), sub = document.getElementById('sSub').value;
            if(!h) return; let db = JSON.parse(localStorage.getItem('s_s')) || {};
            if(!db[d]) db[d] = []; let ex = db[d].find(x => x.subject === sub);
            if(ex) ex.hours += h; else db[d].push({subject: sub, hours: h});
            localStorage.setItem('s_s', JSON.stringify(db)); window.syncData(d); document.getElementById('sHr').value='';
        }
        function renderS(d, db) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (db[d] || []).forEach((s, i) => l.innerHTML += `<div class="list-item"><span class="item-label"><b>${s.subject}</b>: ${s.hours}h</span><span onclick="delS('${d}',${i})" class="del-btn">DEL</span></div>`);
        }
        function delS(d, i) { let db = JSON.parse(localStorage.getItem('s_s')); db[d].splice(i, 1); localStorage.setItem('s_s', JSON.stringify(db)); window.syncData(d); }

        function renderSubM(subs) {
            const l = document.getElementById('subManageList'); l.innerHTML = '';
            subs.forEach((s, i) => l.innerHTML += `<div class="list-item"><span class="item-label">${s}</span><span onclick="remSub(${i})" class="del-btn">REMOVE</span></div>`);
        }
        function remSub(i) { let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]; subs.splice(i, 1); localStorage.setItem('s_subs', JSON.stringify(subs)); window.refresh(); }
        function addNewSub() { const v = document.getElementById('newSubIn').value; let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]; if(v && !subs.includes(v)) { subs.push(v); localStorage.setItem('s_subs', JSON.stringify(subs)); document.getElementById('newSubIn').value=''; window.refresh(); } }

        function addLog() {
            let d = document.getElementById('todayDate').value, s = document.getElementById('startTime').value, e = document.getElementById('endTime').value, a = document.getElementById('logAct').value;
            if(!s || !e || !a) return; let db = JSON.parse(localStorage.getItem('s_dayLog')) || {};
            if(!db[d]) db[d] = []; db[d].push({start: s, end: e, act: a});
            localStorage.setItem('s_dayLog', JSON.stringify(db)); window.syncData(d); document.getElementById('logAct').value='';
        }
        function renderLog(d, db) {
            const l = document.getElementById('logList'); l.innerHTML = '';
            (db[d] || []).forEach(item => { l.innerHTML += `<div class="list-item"><span style="font-weight:800; color:var(--p); font-size:0.7rem; min-width:110px;">${format12(item.start)}-${format12(item.end)}</span><span class="item-label">${item.act}</span></div>`; });
        }

        function updateChart(sDB) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let labels = [], data = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                const s = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString([],{weekday:'short'}));
                let h = 0; (sDB[s]||[]).forEach(x => h += parseFloat(x.hours || 0));
                data.push(h);
            }
            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Hours', data, backgroundColor: '#6366f1', borderRadius: 8 }] }, options: { maintainAspectRatio: false } });
        }

        document.getElementById('taskDate').valueAsDate = new Date();
        document.getElementById('todayDate').valueAsDate = new Date();
        document.getElementById('mainDate').valueAsDate = new Date();
        document.getElementById('studyDate').valueAsDate = new Date();
        window.refresh();
    </script>
</body>
</html>
