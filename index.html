<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Shipon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Your Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('shipon_tasks'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('shipon_study'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('shipon_links')) || [],
              subjects: JSON.parse(localStorage.getItem('shipon_subjects')) || ["English", "Marketing"],
              syncTime: new Date()
          };
          
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("✅ Cloud Sync Successful");
          } catch (e) { alert("❌ Sync Error: " + e.message); }
      };
    </script>

    <style>
        :root { 
            --primary: #6366f1; 
            --accent: #fbbf24; 
            --success: #10b981; 
            --glass: rgba(255, 255, 255, 0.92);
            --text: #1e293b; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-bottom: 100px;
            color: var(--text);
            /* Catchy Animated Gradient */
            background: linear-gradient(-45deg, #4f46e5, #ec4899, #06b6d4, #10b981);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(12px);
            padding: 22px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            margin-bottom: 18px; 
            border: 1px solid rgba(255,255,255,0.4);
        }

        h1 { font-weight: 800; font-size: 1.8rem; color: white; text-shadow: 0 3px 6px rgba(0,0,0,0.2); margin-bottom: 25px; }
        
        .lifetime-card { 
            background: rgba(15, 23, 42, 0.88); 
            backdrop-filter: blur(15px);
            color: white; 
            text-align: center; 
            padding: 30px; 
            border-radius: 30px; 
            margin-bottom: 18px; 
            border: 1px solid rgba(255,255,255,0.15);
        }

        input, select, button { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 18px; 
            border: none; 
            font-size: 1rem; 
            font-weight: 600;
            box-sizing: border-box; 
        }

        button { background: var(--primary); color: white; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
        button:active { transform: scale(0.96); }
        .btn-sync { background: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }

        .score-display { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white; 
            padding: 25px; 
            border-radius: 30px; 
            margin-bottom: 18px; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        .item { display: flex; align-items: center; padding: 14px; background: white; border-radius: 18px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item span { flex: 1; margin-left: 12px; font-weight: 700; color: #334155; }
        .completed { text-decoration: line-through; opacity: 0.4; }
        .del-btn { color: #ef4444; font-weight: 800; font-size: 0.75rem; cursor: pointer; padding: 5px 10px; }

        .bottom-nav { 
            position: fixed; 
            bottom: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 450px; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(20px);
            display: flex; 
            justify-content: space-around; 
            padding: 14px; 
            border-radius: 28px; 
            z-index: 1000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .nav-item { color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 12px 18px; border-radius: 18px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: #fff; background: var(--primary); }
    </style>
</head>
<body>

    <div id="homePage" class="page active-page">
        <h1>Dashboard</h1>
        
        <div class="lifetime-card">
            <small style="opacity: 0.7; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800;">Lifetime Progress</small>
            <div style="font-size: 3.5rem; font-weight: 900; color: var(--accent); margin-top: 8px;" id="lifetimeHours">0.0h</div>
        </div>

        <div class="card">
            <input type="date" id="mainDate" onchange="refreshUI()">
            <button class="btn-sync" onclick="backupToCloud()">Sync to Cloud</button>
        </div>

        <div class="score-display">
            <small style="font-weight: 700; opacity: 0.9;">Daily Performance Score</small>
            <div style="font-size: 4rem; font-weight: 900;" id="perfScore">0</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="card" style="margin:0; text-align:center;"><small style="font-weight: 800; opacity: 0.6;">Tasks</small><div id="homeTask" style="font-size:1.8rem; font-weight:900; margin-top:5px;">0%</div></div>
            <div class="card" style="margin:0; text-align:center;"><small style="font-weight: 800; opacity: 0.6;">Study</small><div id="homeStudy" style="font-size:1.8rem; font-weight:900; color:var(--primary); margin-top:5px;">0.0h</div></div>
        </div>
        <div class="card" style="padding:15px;"><canvas id="myChart" style="height:180px;"></canvas></div>
    </div>

    <div id="tasksPage" class="page">
        <h1>Tasks</h1>
        <div class="card">
            <input type="text" id="taskInput" placeholder="What is your goal today?">
            <button onclick="addTask()">Add Daily Goal</button>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="studyPage" class="page">
        <h1>Study Log</h1>
        <div class="card">
            <div style="display:flex; gap:10px">
                <select id="subSelect" style="flex:2"></select>
                <button onclick="addNewSubject()" style="flex:1; background:#475569; font-size:0.8rem;">+ Sub</button>
            </div>
            <input type="number" id="hrInput" placeholder="Hours" step="0.5">
            <button style="background:var(--accent); color:#1e293b" onclick="addStudy()">Log Progress</button>
        </div>
        <div id="studyLog"></div>
    </div>

    <div id="vaultPage" class="page">
        <h1>Resource Vault</h1>
        <div class="card">
            <input type="text" id="linkTitle" placeholder="Title">
            <input type="text" id="linkURL" placeholder="URL">
            <button style="background:#6366f1" onclick="addLink()">Save Reference</button>
        </div>
        <div id="linkList"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="navHome" onclick="nav('homePage')">Home</div>
        <div class="nav-item" id="navTasks" onclick="nav('tasksPage')">Tasks</div>
        <div class="nav-item" id="navStudy" onclick="nav('studyPage')">Study</div>
        <div class="nav-item" id="navVault" onclick="nav('vaultPage')">Vault</div>
    </div>

    <script>
        document.getElementById('mainDate').valueAsDate = new Date();
        let taskDB = JSON.parse(localStorage.getItem('shipon_tasks')) || {};
        let studyDB = JSON.parse(localStorage.getItem('shipon_study')) || {};
        let linkDB = JSON.parse(localStorage.getItem('shipon_links')) || [];
        let subjects = JSON.parse(localStorage.getItem('shipon_subjects')) || ["English", "Marketing"];
        let chart = null;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav' + id.replace('Page','')).classList.add('active');
            refreshUI();
        }

        function refreshUI() {
            const date = document.getElementById('mainDate').value;
            const dayT = taskDB[date] || [];
            const dayS = studyDB[date] || [];

            const done = dayT.filter(t => t.done).length;
            const tPct = dayT.length ? (done/dayT.length)*100 : 0;
            document.getElementById('homeTask').innerText = Math.round(tPct) + "%";

            let hToday = 0; dayS.forEach(s => hToday += s.hours);
            document.getElementById('homeStudy').innerText = hToday.toFixed(1) + "h";

            let totalLife = 0;
            Object.values(studyDB).forEach(day => day.forEach(s => totalLife += s.hours));
            document.getElementById('lifetimeHours').innerText = totalLife.toFixed(1) + "h";

            const sScore = Math.min((hToday / 4) * 100, 100);
            document.getElementById('perfScore').innerText = Math.round((tPct * 0.5) + (sScore * 0.5));

            const sel = document.getElementById('subSelect');
            sel.innerHTML = ''; subjects.forEach(s => sel.innerHTML += `<option>${s}</option>`);

            renderTasks(date);
            renderStudy(date);
            renderLinks();
            updateChart();

            localStorage.setItem('shipon_tasks', JSON.stringify(taskDB));
            localStorage.setItem('shipon_study', JSON.stringify(studyDB));
            localStorage.setItem('shipon_links', JSON.stringify(linkDB));
            localStorage.setItem('shipon_subjects', JSON.stringify(subjects));
        }

        function addTask() {
            const d = document.getElementById('mainDate').value;
            const v = document.getElementById('taskInput').value;
            if(!v) return;
            if(!taskDB[d]) taskDB[d] = [];
            taskDB[d].push({text: v, done: false});
            document.getElementById('taskInput').value = '';
            refreshUI();
        }

        function addStudy() {
            const d = document.getElementById('mainDate').value;
            const h = parseFloat(document.getElementById('hrInput').value);
            if(!h) return;
            if(!studyDB[d]) studyDB[d] = [];
            studyDB[d].push({subject: document.getElementById('subSelect').value, hours: h});
            document.getElementById('hrInput').value = '';
            refreshUI();
        }

        function addLink() {
            const t = document.getElementById('linkTitle').value;
            const u = document.getElementById('linkURL').value;
            if(t && u) { linkDB.push({title: t, url: u}); refreshUI(); }
        }

        function addNewSubject() {
            const s = prompt("New Subject:");
            if(s && !subjects.includes(s)) { subjects.push(s); refreshUI(); }
        }

        function renderTasks(d) {
            const l = document.getElementById('taskList'); l.innerHTML = '';
            (taskDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="item">
                    <input type="checkbox" style="width:20px" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span class="${t.done?'completed':''}">${t.text}</span>
                    <div class="del-btn" onclick="deleteT('${d}',${i})">REMOVE</div>
                </div>`;
            });
        }

        function toggleT(d, i) { taskDB[d][i].done = !taskDB[d][i].done; refreshUI(); }
        function deleteT(d, i) { taskDB[d].splice(i, 1); refreshUI(); }

        function renderStudy(d) {
            const l = document.getElementById('studyLog'); l.innerHTML = '';
            (studyDB[d] || []).forEach(s => l.innerHTML += `<div class="item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }

        function renderLinks() {
            const l = document.getElementById('linkList'); l.innerHTML = '';
            linkDB.forEach(link => {
                l.innerHTML += `<div class="card" style="padding:15px"><a href="${link.url}" target="_blank" style="text-decoration:none; color:var(--primary); font-weight:800;">🔗 ${link.title}</a></div>`;
            });
        }

        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const labels = []; const data = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                const s = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString([],{weekday:'short'}));
                let h = 0; (studyDB[s]||[]).forEach(x => h+=x.hours);
                data.push(h);
            }
            if(chart) chart.destroy();
            chart = new Chart(ctx, { 
                type:'line', 
                data:{ labels, datasets:[{label:'Hours', data, borderColor:'#fff', borderWidth:3, tension:0.4, fill:true, backgroundColor:'rgba(255, 255, 255, 0.1)'}] }, 
                options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, display:false}, x:{grid:{display:false}, ticks:{color:'#fff'}}}} 
            });
        }

        window.onload = refreshUI;
    </script>
</body>
</html>
