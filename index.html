<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE | Final Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc, getDocs, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.syncData = async (date, silent = false) => {
          const localData = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              dayLog: JSON.parse(localStorage.getItem('s_dayLog'))?.[date] || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          try {
              await setDoc(doc(db, "global_master", "history", "dates", date), localData);
              const snap = await getDocs(collection(db, "global_master", "history", "dates"));
              let s_s = {}, s_t = {}, s_d = {};
              snap.forEach(d => {
                  const data = d.data();
                  s_s[d.id] = data.study || [];
                  s_t[d.id] = data.tasks || [];
                  s_d[d.id] = data.dayLog || [];
              });
              localStorage.setItem('s_s', JSON.stringify(s_s));
              localStorage.setItem('s_t', JSON.stringify(s_t));
              localStorage.setItem('s_dayLog', JSON.stringify(s_d));
              window.refresh();
          } catch (e) { console.error("Sync Failed", e); }
      };

      onSnapshot(collection(db, "global_master", "history", "dates"), (snap) => {
          let s_s = {}, s_t = {}, s_d = {};
          snap.forEach(d => {
              const data = d.data();
              s_s[d.id] = data.study || [];
              s_t[d.id] = data.tasks || [];
              s_d[d.id] = data.dayLog || [];
          });
          localStorage.setItem('s_s', JSON.stringify(s_s));
          localStorage.setItem('s_t', JSON.stringify(s_t));
          localStorage.setItem('s_dayLog', JSON.stringify(s_d));
          window.refresh();
      });
    </script>

    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }

        .page { display: none; padding: 25px; max-width: 500px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .m3-card { background: var(--surface); border-radius: 28px; padding: 22px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: rgba(128,128,128,0.05); color: inherit; margin: 8px 0; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; transition: 0.2s; }
        
        /* List UI Styles */
        .list-item { display: flex; align-items: center; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 12px; border-left: 5px solid var(--p); text-align: left; }
        .item-label { flex: 1; margin-left: 15px; font-weight: 700; font-size: 1rem; color: var(--text); }
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 4px; text-decoration-color: var(--s); opacity: 0.4; font-style: italic; }
        .del-text { color: #ef4444; font-size: 0.65rem; font-weight: 800; cursor: pointer; margin-left: 10px; }

        /* Stats Tab Specifics */
        .chip-group { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 16px; border-radius: 10px; background: rgba(128,128,128,0.1); font-size: 0.7rem; font-weight: 800; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); }
        .chip.active { background: var(--p); color: white; }
    </style>
</head>
<body>

    <div id="homeP" class="page active-page">
        <h1 style="margin:0; font-weight:800; letter-spacing: -2px;">SHIPON'S LIFE</h1>
        <div class="m3-card" style="text-align: center; border-left: 5px solid var(--p); margin-top: 20px;">
            <small style="text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-weight: 800;">Lifetime Mastery</small>
            <div style="font-size: 4rem; font-weight: 900;" id="lifeH">0.0</div>
        </div>
        <div class="m3-card">
            <small style="font-weight: 800; opacity: 0.5;">Master System Date</small>
            <input type="date" id="mainDate" onchange="window.refresh()">
            <button onclick="window.syncData(document.getElementById('mainDate').value)" style="background:var(--s); margin-top: 15px;">🔄 SYNC ALL DEVICES</button>
        </div>
    </div>

    <div id="statsP" class="page">
        <h1>Analytics Engine</h1>
        <div class="chip-group">
            <div class="chip active" onclick="setChartMode('day', this)">Day</div>
            <div class="chip" onclick="setChartMode('week', this)">Week</div>
            <div class="chip" onclick="setChartMode('month', this)">Month</div>
            <div class="chip" onclick="setChartMode('year', this)">Year</div>
            <div class="chip" onclick="setChartMode('comp', this)" style="border-color: var(--s);">Compare</div>
        </div>
        <div id="compUI" style="display:none;" class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="date" id="dateA" onchange="updateChart()">
                <input type="date" id="dateB" onchange="updateChart()">
            </div>
            <select id="compSub" onchange="updateChart()" style="margin-top:10px;"></select>
        </div>
        <div class="m3-card" style="height: 350px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="tasksP" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h1 style="margin:0;">Goals</h1>
            <input type="date" id="taskDate" onchange="window.refresh()" style="width: auto; padding: 8px; font-size: 0.8rem; background: var(--p); border:none; color:white; border-radius: 10px;">
        </div>
        <div class="m3-card">
            <input type="text" id="tIn" placeholder="Mission for this date...">
            <button onclick="addT()">COMMIT TASK</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="dayLogP" class="page">
        <h1>24H Routine</h1>
        <div class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="time" id="startTime"><input type="time" id="endTime">
            </div>
            <input type="text" id="logAct" placeholder="Activity..."><button onclick="addLog()">LOG</button>
        </div>
        <div id="logList"></div>
    </div>

    <div id="studyP" class="page">
        <h1>Study Center</h1>
        <div class="m3-card">
            <small style="font-weight: 800; opacity: 0.5;">Select Subject</small>
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Study Hours (e.g. 1.5)" step="0.5">
            <button onclick="addS()">SAVE SESSION</button>
        </div>

        <h3 style="margin-top: 30px;">Daily Log</h3>
        <div id="sLog"></div>

        <h3 style="margin-top: 30px;">Subject Management</h3>
        <div class="m3-card">
            <input type="text" id="newSubIn" placeholder="New Field (e.g. Content Writing)">
            <button onclick="addNewSub()" style="background: var(--s);">+ ADD NEW FIELD</button>
        </div>
        <div id="subManageList"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('dayLogP', this)">24H</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
    </nav>

    <script>
        let cMode = 'day';
        document.getElementById('taskDate').valueAsDate = new Date();

        window.refresh = function() {
            const mDate = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            const tDate = document.getElementById('taskDate').value;
            const sDB = JSON.parse(localStorage.getItem('s_s')) || {};
            const tDB = JSON.parse(localStorage.getItem('s_t')) || {};
            const dLogDB = JSON.parse(localStorage.getItem('s_dayLog')) || {};
            const subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];

            let total = 0;
            Object.values(sDB).forEach(day => (day || []).forEach(e => total += parseFloat(e.hours || 0)));
            document.getElementById('lifeH').innerText = total.toFixed(1);

            const sSel = document.getElementById('sSub'); 
            const cSel = document.getElementById('compSub');
            sSel.innerHTML = ''; 
            cSel.innerHTML = '<option value="all">Total Hours</option>';
            subs.forEach(s => { 
                sSel.innerHTML += `<option>${s}</option>`; 
                cSel.innerHTML += `<option>${s}</option>`; 
            });

            renderT(tDate, tDB); 
            renderS(mDate, sDB); 
            renderLog(mDate, dLogDB); 
            renderSubM(subs);
            updateChart();
        };

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active'); window.refresh();
        }

        // --- STUDY LOGIC ---
        function addS() {
            let d = document.getElementById('mainDate').value, h = parseFloat(document.getElementById('sHr').value), sub = document.getElementById('sSub').value;
            if(!h) return; let db = JSON.parse(localStorage.getItem('s_s')) || {};
            if(!db[d]) db[d] = [];
            let ex = db[d].find(x => x.subject === sub);
            if(ex) ex.hours += h; else db[d].push({subject: sub, hours: h});
            localStorage.setItem('s_s', JSON.stringify(db)); window.syncData(d, true);
            document.getElementById('sHr').value = '';
        }
        function renderS(d, db) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (db[d] || []).forEach((s, i) => { 
                l.innerHTML += `<div class="list-item">
                    <span class="item-label"><b>${s.subject}</b>: ${s.hours}h</span>
                    <span onclick="delS('${d}',${i})" class="del-text">CLEAR</span>
                </div>`; 
            });
        }
        function delS(d, i) { let db = JSON.parse(localStorage.getItem('s_s')); db[d].splice(i, 1); localStorage.setItem('s_s', JSON.stringify(db)); window.syncData(d, true); }

        function addNewSub() { 
            const v = document.getElementById('newSubIn').value; 
            let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];
            if(v && !subs.includes(v)) { 
                subs.push(v); 
                localStorage.setItem('s_subs', JSON.stringify(subs)); 
                document.getElementById('newSubIn').value = '';
                window.syncData(document.getElementById('mainDate').value, true); 
            } 
        }
        function renderSubM(subs) {
            const l = document.getElementById('subManageList'); l.innerHTML = '';
            subs.forEach((s, i) => { 
                l.innerHTML += `<div class="list-item">
                    <span class="item-label">${s}</span>
                    <span onclick="remSub(${i})" class="del-text">REMOVE</span>
                </div>`; 
            });
        }
        function remSub(i) { let subs = JSON.parse(localStorage.getItem('s_subs')); subs.splice(i, 1); localStorage.setItem('s_subs', JSON.stringify(subs)); window.refresh(); }

        // --- TASKS LOGIC ---
        function addT() {
            let d = document.getElementById('taskDate').value, v = document.getElementById('tIn').value;
            if(!v) return; let db = JSON.parse(localStorage.getItem('s_t')) || {};
            if(!db[d]) db[d] = []; db[d].push({text: v, done: false});
            localStorage.setItem('s_t', JSON.stringify(db)); window.syncData(d, true);
            document.getElementById('tIn').value = '';
        }
        function renderT(d, db) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (db[d] || []).forEach((t, i) => { 
                l.innerHTML += `<div class="list-item">
                    <input type="checkbox" style="width:22px; height:22px;" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span class="item-label ${t.done?'motivation-line':''}">${t.text}</span>
                    <span onclick="delT('${d}',${i})" class="del-text">DEL</span>
                </div>`; 
            });
        }
        function toggleT(d, i) { let db = JSON.parse(localStorage.getItem('s_t')); db[d][i].done = !db[d][i].done; localStorage.setItem('s_t', JSON.stringify(db)); window.syncData(d, true); }
        function delT(d, i) { let db = JSON.parse(localStorage.getItem('s_t')); db[d].splice(i, 1); localStorage.setItem('s_t', JSON.stringify(db)); window.syncData(d, true); }

        // --- 24H LOGIC ---
        function addLog() {
            let d = document.getElementById('mainDate').value, s = document.getElementById('startTime').value, e = document.getElementById('endTime').value, a = document.getElementById('logAct').value;
            if(!s || !e || !a) return; let db = JSON.parse(localStorage.getItem('s_dayLog')) || {};
            if(!db[d]) db[d] = []; db[d].push({start: s, end: e, act: a});
            localStorage.setItem('s_dayLog', JSON.stringify(db)); window.syncData(d, true);
            document.getElementById('logAct').value = '';
        }
        function renderLog(d, db) {
            const l = document.getElementById('logList'); l.innerHTML = '';
            (db[d] || []).forEach(item => { l.innerHTML += `<div class="list-item"><span style="font-weight:800; color:var(--p); font-size:0.8rem;">${item.start}-${item.end}</span><span class="item-label">${item.act}</span></div>`; });
        }

        // --- STATS LOGIC ---
        function setChartMode(m, el) { cMode = m; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); document.getElementById('compUI').style.display = m === 'comp' ? 'block' : 'none'; updateChart(); }
        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const sDB = JSON.parse(localStorage.getItem('s_s')) || {};
            let labels = [], data = [];
            if(cMode === 'comp') {
                const dA = document.getElementById('dateA').value, dB = document.getElementById('dateB').value, sub = document.getElementById('compSub').value;
                labels = [dA || 'A', dB || 'B'];
                let vA = 0, vB = 0;
                if(dA) (sDB[dA]||[]).forEach(x => { if(sub==='all' || x.subject===sub) vA += x.hours; });
                if(dB) (sDB[dB]||[]).forEach(x => { if(sub==='all' || x.subject===sub) vB += x.hours; });
                data = [vA, vB];
            } else {
                let count = cMode === 'day' ? 7 : cMode === 'week' ? 4 : cMode === 'month' ? 12 : 5;
                for(let i=count-1; i>=0; i--) {
                    const d = new Date();
                    if(cMode === 'day') d.setDate(d.getDate()-i);
                    if(cMode === 'week') d.setDate(d.getDate()-(i*7));
                    if(cMode === 'month') d.setMonth(d.getMonth()-i);
                    if(cMode === 'year') d.setFullYear(d.getFullYear()-i);
                    const s = d.toISOString().split('T')[0];
                    labels.push(cMode === 'day' ? d.toLocaleDateString([],{weekday:'short'}) : s);
                    let h = 0; (sDB[s]||[]).forEach(x => h+=x.hours);
                    data.push(h);
                }
            }
            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Study Hours', data, backgroundColor: '#6366f1', borderRadius: 10 }] }, options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } } });
        }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.refresh();
    </script>
</body>
</html>
