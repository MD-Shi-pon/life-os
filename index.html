<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('s_l')) || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("✅ System State Backed Up");
          } catch (e) { alert("Error: " + e.message); }
      };
    </script>

    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        /* Fixed Alignment for Mobile */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }

        .page { display: none; padding: 25px; max-width: 500px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .m3-card { background: var(--surface); border-radius: 24px; padding: 22px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .home-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #mainDate { background: transparent; color: var(--p); border: 1px solid var(--p); padding: 8px 12px; border-radius: 12px; font-weight: 700; font-family: inherit; }

        /* Perfect Motivational Alignment */
        .list-item { display: flex; align-items: center; padding: 16px; background: rgba(128,128,128,0.05); border-radius: 18px; margin-bottom: 10px; box-sizing: border-box; }
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 4px; text-decoration-color: var(--s); opacity: 0.5; font-weight: 800; }

        button { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; transition: 0.2s; }
        input, select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid rgba(128,128,128,0.2); background: rgba(0,0,0,0.1); color: inherit; margin: 8px 0; box-sizing: border-box; }
        
        .chip-group { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 16px; border-radius: 12px; background: rgba(128,128,128,0.1); font-size: 0.7rem; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--p); color: white; }
    </style>
</head>
<body class="dark-mode">

    <div id="homeP" class="page active-page">
        <h1 style="margin:0; font-weight:800; letter-spacing: -1.5px;">SHIPON'S LIFE</h1>
        <div class="m3-card" style="text-align: center; border-left: 5px solid var(--p); margin-top: 20px;">
            <small style="text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-weight: 800;">Lifetime Mastery</small>
            <div style="font-size: 4rem; font-weight: 900;" id="lifeH">0.0h</div>
        </div>
        <div class="home-controls">
            <span style="font-weight: 800; opacity: 0.7;">System Date</span>
            <input type="date" id="mainDate" onchange="refresh()">
        </div>
        <button onclick="backupToCloud()" style="background:var(--s)">SYNC ALL DATA</button>
    </div>

    <div id="statsP" class="page">
        <h1>Analytics Engine</h1>
        <div class="chip-group">
            <div class="chip active" onclick="setChart('day', this)">Daily</div>
            <div class="chip" onclick="setChart('week', this)">Weekly</div>
            <div class="chip" onclick="setChart('month', this)">Monthly</div>
            <div class="chip" onclick="setChart('year', this)">Yearly</div>
            <div class="chip" onclick="setChart('comp', this)" style="border: 1px solid var(--s);">Comparison</div>
        </div>
        
        <div id="compControls" style="display:none;" class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><small>Date A</small><input type="date" id="dateA" onchange="updateChart()"></div>
                <div><small>Date B</small><input type="date" id="dateB" onchange="updateChart()"></div>
            </div>
            <select id="compSub" onchange="updateChart()" style="margin-top:10px;">
                <option value="total">Compare Total Hours</option>
            </select>
        </div>

        <div class="m3-card" style="height: 350px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="tasksP" class="page">
        <h1>Priority Goals</h1>
        <div class="m3-card">
            <input type="text" id="tIn" placeholder="Commit to a goal...">
            <button onclick="addT()">LOG TASK</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="studyP" class="page">
        <h1>Study Center</h1>
        <div class="m3-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Hours (e.g. 1.5)" step="0.5">
            <button onclick="addS()">SAVE PROGRESS</button>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <input type="text" id="newSub" placeholder="New Field Name...">
            <button onclick="addNewSub()" style="background:#475569">+ ADD SUBJECT</button>
        </div>
        <h3>Manage Subjects</h3>
        <div id="subManage"></div>
        <h3>Daily Log</h3>
        <div id="sLog"></div>
    </div>

    <div id="vaultP" class="page">
        <h1>Link Vault</h1>
        <div class="m3-card">
            <input type="text" id="lTitle" placeholder="Title">
            <input type="text" id="lUrl" placeholder="URL">
            <button onclick="addL()" style="background:var(--s)">SAVE REFERENCE</button>
        </div>
        <div id="lList"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
        <div class="nav-item" onclick="nav('vaultP', this)">Vault</div>
    </nav>

    <script>
        let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let sDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let lDB = JSON.parse(localStorage.getItem('s_l')) || [];
        let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];
        let cMode = 'day';

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            refresh();
        }

        function refresh() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            let tL = 0; 
            Object.values(sDB).forEach(day => day.forEach(s => tL += s.hours));
            document.getElementById('lifeH').innerText = tL.toFixed(1) + "h";

            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            const cSel = document.getElementById('compSub'); cSel.innerHTML = '<option value="total">Compare Total Hours</option>';
            subs.forEach(s => {
                sel.innerHTML += `<option>${s}</option>`;
                cSel.innerHTML += `<option>${s}</option>`;
            });

            renderT(date); renderS(date); renderL(); renderSubM(); updateChart();
            localStorage.setItem('s_t', JSON.stringify(tDB));
            localStorage.setItem('s_s', JSON.stringify(sDB));
            localStorage.setItem('s_l', JSON.stringify(lDB));
            localStorage.setItem('s_subs', JSON.stringify(subs));
        }

        function setChart(m, el) {
            cMode = m;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('compControls').style.display = m === 'comp' ? 'block' : 'none';
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let labels = [], data = [];
            
            if(cMode === 'comp') {
                const dA = document.getElementById('dateA').value;
                const dB = document.getElementById('dateB').value;
                const sub = document.getElementById('compSub').value;
                labels = [dA || 'A', dB || 'B'];
                let vA = 0, vB = 0;
                if(dA) (sDB[dA]||[]).forEach(s => { if(sub==='total' || s.subject===sub) vA += s.hours; });
                if(dB) (sDB[dB]||[]).forEach(s => { if(sub==='total' || s.subject===sub) vB += s.hours; });
                data = [vA, vB];
            } else {
                let count = cMode === 'day' ? 7 : cMode === 'week' ? 4 : cMode === 'month' ? 12 : 5;
                for(let i=count-1; i>=0; i--) {
                    const d = new Date();
                    if(cMode === 'day') d.setDate(d.getDate()-i);
                    if(cMode === 'month') d.setMonth(d.getMonth()-i);
                    if(cMode === 'year') d.setFullYear(d.getFullYear()-i);
                    const s = d.toISOString().split('T')[0];
                    labels.push(cMode === 'day' ? d.toLocaleDateString([],{weekday:'short'}) : (cMode === 'month' ? d.toLocaleDateString([],{month:'short'}) : d.getFullYear()));
                    let h = 0; (sDB[s]||[]).forEach(x => h+=x.hours);
                    data.push(h);
                }
            }
            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Hours', data, backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        function addT() {
            const d = document.getElementById('mainDate').value; const v = document.getElementById('tIn').value;
            if(!v) return; if(!tDB[d]) tDB[d] = [];
            tDB[d].push({text: v, done: false}); document.getElementById('tIn').value = ''; refresh();
        }

        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (tDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="list-item">
                    <input type="checkbox" style="width:22px; height:22px;" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span style="flex:1; margin-left:15px; font-weight:700;" class="${t.done?'motivation-line':''}"> ${t.text}</span>
                    <span onclick="delT('${d}',${i})" style="color:#ef4444; font-size:0.7rem; cursor:pointer; font-weight:800;">CLEAR</span>
                </div>`;
            });
        }
        function toggleT(d, i) { tDB[d][i].done = !tDB[d][i].done; refresh(); }
        function delT(d, i) { if(confirm("Clear task?")) { tDB[d].splice(i, 1); refresh(); } }

        function addS() {
            const d = document.getElementById('mainDate').value; const h = parseFloat(document.getElementById('sHr').value);
            const sub = document.getElementById('sSub').value;
            if(!h) return;
            if(!sDB[d]) sDB[d] = [];
            const ex = sDB[d].find(s => s.subject === sub);
            if(ex) ex.hours += h; else sDB[d].push({subject: sub, hours: h});
            document.getElementById('sHr').value = ''; refresh();
        }

        function renderS(d) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (sDB[d] || []).forEach(s => l.innerHTML += `<div class="list-item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }

        function renderSubM() {
            const l = document.getElementById('subManage'); l.innerHTML = '';
            subs.forEach((s, i) => l.innerHTML += `<div class="list-item">${s} <span onclick="remSub(${i})" style="color:#ef4444; margin-left:auto; cursor:pointer; font-size:0.7rem; font-weight:800;">REMOVE</span></div>`);
        }
        function remSub(i) { if(confirm("Remove subject?")) { subs.splice(i, 1); refresh(); } }
        function addNewSub() { const v = document.getElementById('newSub').value; if(v && !subs.includes(v)) { subs.push(v); document.getElementById('newSub').value=''; refresh(); } }

        function addL() {
            const t = document.getElementById('lTitle').value; const u = document.getElementById('lUrl').value;
            if(t && u) { lDB.push({t, u}); document.getElementById('lTitle').value=''; document.getElementById('lUrl').value=''; refresh(); }
        }
        function renderL() {
            const l = document.getElementById('lList'); l.innerHTML = '';
            lDB.forEach((link, i) => l.innerHTML += `<div class="list-item"><a href="${link.u}" target="_blank" style="color:var(--s);text-decoration:none;font-weight:800;flex:1;">🔗 ${link.t}</a><span onclick="delL(${i})" style="color:#ef4444;font-size:0.7rem;cursor:pointer;font-weight:800;">DEL</span></div>`);
        }
        function delL(i) { lDB.splice(i, 1); refresh(); }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
