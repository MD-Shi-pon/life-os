<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON | Life OS</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">

    <div class="theme-toggle" onclick="window.toggleTheme()">🌗</div>

    <main id="app-container" style="padding: 20px; padding-bottom: 90px;">

        <section id="homeP" class="page active-page">
            <h1 style="font-weight:900; letter-spacing:-2px;">LIFE OS</h1>
            <div class="glass-card" style="text-align:center; border-left: 5px solid var(--p);">
                <small id="homeDay" style="text-transform:uppercase; font-weight:800; color:var(--p);"></small>
                <div style="font-size:4rem; font-weight:900;" id="lifeH">0.0</div>
                <p style="opacity:0.6; font-size:0.8rem; font-weight:700;">TOTAL MASTERY HOURS</p>
            </div>
            <input type="date" id="mainDate" onchange="window.refresh()">
        </section>

        <section id="studyP" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Study</h1>
                <input type="date" id="studyDate" onchange="window.refresh()" style="width:auto; background:var(--p); border:none; padding:5px 10px; border-radius:8px; color:white;">
            </div>

            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button id="tabLog" onclick="window.switchStudyTab('log')" style="flex:1; font-size:0.7rem;">LOG HOURS</button>
                <button id="tabManage" onclick="window.switchStudyTab('manage')" style="flex:1; font-size:0.7rem; background:#475569;">SUBJECTS</button>
            </div>

            <div id="viewLog">
                <div class="glass-card">
                    <select id="sSub" style="margin-bottom:10px;"></select>
                    <input type="number" id="sHr" placeholder="Hours (e.g. 1.5)" step="0.5">
                    <button onclick="window.addStudyEntry()" style="background:var(--p);">SAVE PROGRESS</button>
                </div>
                <div id="sLog"></div>
            </div>

            <div id="viewManage" style="display:none;">
                <div class="glass-card">
                    <input type="text" id="newSubIn" placeholder="New Field (e.g. English)">
                    <button onclick="window.addNewSubject()" style="background:var(--s);">+ ADD TO LIST</button>
                </div>
                <h3 style="font-size:0.9rem; opacity:0.6; margin-bottom:10px;">EXISTING FIELDS</h3>
                <div id="subManageList"></div>
            </div>
        </section>

        <section id="tasksP" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Mission</h1>
                <input type="date" id="taskDate" onchange="window.refresh()" style="width:auto; background:var(--s); border:none; padding:5px 10px; border-radius:8px; color:white;">
            </div>
            <div class="glass-card">
                <input type="text" id="tIn" placeholder="New Objective...">
                <button onclick="window.addTask()" style="background:var(--s);">ADD MISSION</button>
            </div>
            <div id="tList"></div>
        </section>

        <section id="dayLogP" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Today</h1>
                <input type="date" id="todayDate" onchange="window.refresh()" style="width:auto; background:var(--p); border:none; padding:5px 10px; border-radius:8px; color:white;">
            </div>
            <div class="glass-card">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="time" id="startTime"><input type="time" id="endTime">
                </div>
                <input type="text" id="logAct" placeholder="What are you doing?">
                <button onclick="window.addRoutineLog()">LOG ROUTINE</button>
            </div>
            <div id="logList"></div>
        </section>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="window.nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="window.nav('dayLogP', this)">Today</div>
        <div class="nav-item" onclick="window.nav('studyP', this)">Study</div>
    </nav>

    <script type="module" src="./app.js"></script>
</body>
</html>
