<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipon's Life</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css?v=12">
</head>
<body>

<header class="header">
  <h1>Shipon's Life</h1>
  <p id="todayDate"></p>
</header>

<main>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="card">
    <h3>Lifetime Study Hours</h3>
    <h1 id="lifetimeHours">0</h1>
  </div>
</section>

<!-- TASKS -->
<section id="tasks" class="tab">
  <h2>Tasks</h2>
  <div class="row">
    <input type="text" id="taskInput" placeholder="Add Task">
    <button id="addTask">Add</button>
  </div>
  <ul id="taskList"></ul>
</section>

<!-- STUDY -->
<section id="study" class="tab">
  <h2>Study</h2>

  <!-- Subject Manager -->
  <div class="card">
    <h3>Manage Subjects</h3>

    <div class="row">
      <input type="text" id="newSubjectInput" placeholder="Add New Subject">
      <button id="addSubjectBtn">Add</button>
    </div>

    <ul id="subjectList">
      <!-- Subjects will render here -->
    </ul>
  </div>

  <!-- Study Entry -->
  <div class="card" style="margin-top:20px;">
    <h3>Add Study Record</h3>

    <div class="row">
      <input type="date" id="studyDate">
    </div>

    <div class="row">
      <select id="subjectInput">
        <option value="">Select Subject</option>
      </select>
    </div>

    <div class="row">
      <input type="number" id="hoursInput" placeholder="Hours" step="0.25">
      <button id="addStudy">Add</button>
    </div>

    <ul id="studyList"></ul>
  </div>
</section>

<!-- ANALYZE -->
<section id="analyze" class="tab">
  <h2>Analyze Performance</h2>

  <div class="card">

    <!-- Subject Filter -->
    <div class="row">
      <select id="analyzeSubject">
        <option value="all">All Subjects</option>
      </select>
    </div>

    <!-- Date Range Filter -->
    <div class="row">
      <input type="date" id="startDate">
      <input type="date" id="endDate">
    </div>

    <!-- Time Grouping -->
    <div class="row">
      <select id="timeRange">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
    </div>

  </div>

  <canvas id="mainChart" style="margin-top:20px;"></canvas>
</section>

</main>

<nav class="bottom-nav">
  <button data-tab="home">Home</button>
  <button data-tab="tasks">Tasks</button>
  <button data-tab="study">Study</button>
  <button data-tab="analyze">Analyze</button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
