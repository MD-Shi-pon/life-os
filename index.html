<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPON'S LIFE | Elite Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('s_t'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('s_s'))?.[date] || [],
              dayLog: JSON.parse(localStorage.getItem('s_dayLog'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('s_l')) || [],
              subs: JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"]
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("✅ System Archived to Cloud");
          } catch (e) { alert("Error: " + e.message); }
      };
    </script>

    <style>
        :root { --p: #6366f1; --s: #10b981; --a: #f59e0b; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        .light-mode { --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --border: rgba(0, 0, 0, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; transition: 0.3s; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--p); }
        .header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 0 20px; animation: fadeInUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .m3-card { background: var(--surface); border-radius: 24px; padding: 22px; margin-bottom: 16px; border: 1px solid var(--border); }
        .list-item { display: flex; align-items: center; padding: 14px; background: rgba(128,128,128,0.05); border-radius: 18px; margin-bottom: 8px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(128,128,128,0.1); color: inherit; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; background: var(--p); color: white; margin-top: 8px; }
        .motivation-line { text-decoration: line-through; text-decoration-thickness: 3px; text-decoration-color: var(--s); opacity: 0.4; font-weight: 800; }
        .chip-group { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 16px; border-radius: 12px; background: rgba(128,128,128,0.1); font-size: 0.7rem; font-weight: 800; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); }
        .chip.active { background: var(--p); color: white; }
    </style>
</head>
<body class="dark-mode">

    <div class="header">
        <h1 style="margin:0; font-weight:800; letter-spacing: -1.5px;">SHIPON'S LIFE</h1>
        <div onclick="toggleMode()" style="cursor:pointer; font-size:1.2rem;">🌗</div>
    </div>

    <div id="homeP" class="page active-page">
        <div class="m3-card" style="text-align: center; border-left: 5px solid var(--p);">
            <small style="text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-weight: 800;">Real Lifetime Mastery</small>
            <div style="font-size: 4rem; font-weight: 900;" id="lifeH">0.0h</div>
        </div>
        <div class="m3-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight: 800; opacity: 0.7;">Active Date</span>
                <input type="date" id="mainDate" onchange="refresh()" style="width: auto;">
            </div>
            <button onclick="backupToCloud()" style="background:var(--s); margin-top: 15px;">SYNC ALL DATA</button>
        </div>
    </div>

    <div id="statsP" class="page">
        <h1>Analytics Engine</h1>
        <div class="chip-group">
            <div class="chip active" onclick="setChart('day', this)">Daily</div>
            <div class="chip" onclick="setChart('month', this)">Monthly</div>
            <div class="chip" onclick="setChart('year', this)">Yearly</div>
            <div class="chip" onclick="setChart('comp', this)" style="border-color: var(--s);">Comparison</div>
        </div>
        <div id="compControls" style="display:none;" class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="date" id="dateA" onchange="updateChart()">
                <input type="date" id="dateB" onchange="updateChart()">
            </div>
            <select id="compSub" onchange="updateChart()" style="margin-top:10px;"></select>
        </div>
        <div class="m3-card" style="height: 300px;"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="tasksP" class="page">
        <h1 id="taskDateLabel">Today's Tasks</h1>
        <div class="m3-card">
            <input type="text" id="tIn" placeholder="New goal for this date...">
            <button onclick="addT()">COMMIT TASK</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="dayLogP" class="page">
        <h1>24H Routine</h1>
        <div class="m3-card">
            <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:10px;">
                <input type="time" id="logTime">
                <input type="text" id="logAct" placeholder="Activity...">
            </div>
            <button onclick="addLog()">ADD TO ROUTINE</button>
        </div>
        <div id="logList"></div>
        <div class="m3-card" style="height: 200px;"><canvas id="routineChart"></canvas></div>
    </div>

    <div id="studyP" class="page">
        <h1>Study Center</h1>
        <div class="m3-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Hours" step="0.5">
            <button onclick="addS()">SAVE PROGRESS</button>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <input type="text" id="newSub" placeholder="New Field...">
            <button onclick="addNewSub()" style="background:#475569">+ ADD SUBJECT</button>
        </div>
        <div id="subManage"></div>
        <div id="sLog"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('homeP', this)">Home</div>
        <div class="nav-item" onclick="nav('statsP', this)">Stats</div>
        <div class="nav-item" onclick="nav('tasksP', this)">Tasks</div>
        <div class="nav-item" onclick="nav('dayLogP', this)">24H</div>
        <div class="nav-item" onclick="nav('studyP', this)">Study</div>
    </nav>

    <script>
        let tDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let sDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let lDB = JSON.parse(localStorage.getItem('s_l')) || [];
        let dLogDB = JSON.parse(localStorage.getItem('s_dayLog')) || {};
        let subs = JSON.parse(localStorage.getItem('s_subs')) || ["English", "Marketing"];
        let cMode = 'day';

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            refresh();
        }

        function toggleMode() { document.body.classList.toggle('light-mode'); }

        function refresh() {
            const date = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            document.getElementById('taskDateLabel').innerText = "Tasks: " + date;
            
            // 1. Logic-based Lifetime Mastery
            let totalHours = 0;
            Object.values(sDB).forEach(dayArray => {
                dayArray.forEach(entry => totalHours += entry.hours);
            });
            document.getElementById('lifeH').innerText = totalHours.toFixed(1) + "h";

            // 2. Subject Lists
            const sel = document.getElementById('sSub'); 
            const cSel = document.getElementById('compSub');
            sel.innerHTML = ''; cSel.innerHTML = '<option value="all">Compare All Subjects</option>';
            subs.forEach(s => {
                sel.innerHTML += `<option>${s}</option>`;
                cSel.innerHTML += `<option>${s}</option>`;
            });

            renderT(date); renderS(date); renderLog(date); renderSubM(); updateChart(); updateRoutineChart(date);
            localStorage.setItem('s_t', JSON.stringify(tDB));
            localStorage.setItem('s_s', JSON.stringify(sDB));
            localStorage.setItem('s_dayLog', JSON.stringify(dLogDB));
            localStorage.setItem('s_subs', JSON.stringify(subs));
        }

        function setChart(m, el) {
            cMode = m;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('compControls').style.display = m === 'comp' ? 'block' : 'none';
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let labels = [], data = [];
            if(cMode === 'comp') {
                const dA = document.getElementById('dateA').value;
                const dB = document.getElementById('dateB').value;
                const sub = document.getElementById('compSub').value;
                labels = [dA || 'A', dB || 'B'];
                let vA = 0, vB = 0;
                if(dA) (sDB[dA]||[]).forEach(s => { if(sub==='all' || s.subject===sub) vA += s.hours; });
                if(dB) (sDB[dB]||[]).forEach(s => { if(sub==='all' || s.subject===sub) vB += s.hours; });
                data = [vA, vB];
            } else {
                let count = cMode === 'day' ? 7 : cMode === 'month' ? 12 : 5;
                for(let i=count-1; i>=0; i--) {
                    const d = new Date();
                    if(cMode === 'day') d.setDate(d.getDate()-i);
                    if(cMode === 'month') d.setMonth(d.getMonth()-i);
                    if(cMode === 'year') d.setFullYear(d.getFullYear()-i);
                    const s = d.toISOString().split('T')[0];
                    labels.push(cMode === 'day' ? d.toLocaleDateString([],{weekday:'short'}) : (cMode === 'month' ? d.toLocaleDateString([],{month:'short'}) : d.getFullYear()));
                    let h = 0; (sDB[s]||[]).forEach(x => h+=x.hours);
                    data.push(h);
                }
            }
            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, {
                type: 'bar', data: { labels, datasets: [{ label: 'Hours', data, backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        // TASK LOGIC
        function addT() {
            const d = document.getElementById('mainDate').value; const v = document.getElementById('tIn').value;
            if(!v) return; if(!tDB[d]) tDB[d] = [];
            tDB[d].push({text: v, done: false}); document.getElementById('tIn').value = ''; refresh();
        }
        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (tDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="list-item">
                    <input type="checkbox" style="width:20px; height:20px;" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span style="flex:1; margin-left:12px; font-weight:700;" class="${t.done?'motivation-line':''}">${t.text}</span>
                    <span onclick="delT('${d}',${i})" style="color:#ef4444; font-size:0.7rem; cursor:pointer;">DEL</span>
                </div>`;
            });
        }
        function toggleT(d, i) { tDB[d][i].done = !tDB[d][i].done; refresh(); }
        function delT(d, i) { tDB[d].splice(i, 1); refresh(); }

        // 24H LOGIC
        function addLog() {
            const d = document.getElementById('mainDate').value;
            const t = document.getElementById('logTime').value;
            const a = document.getElementById('logAct').value;
            if(!t || !a) return;
            if(!dLogDB[d]) dLogDB[d] = [];
            dLogDB[d].push({time: t, act: a});
            dLogDB[d].sort((x,y) => x.time.localeCompare(y.time));
            document.getElementById('logAct').value = ''; refresh();
        }
        function renderLog(d) {
            const l = document.getElementById('logList'); l.innerHTML = '';
            (dLogDB[d] || []).forEach(item => {
                l.innerHTML += `<div class="list-item"><b>${item.time}</b> <span style="margin-left:10px">${item.act}</span></div>`;
            });
        }
        function updateRoutineChart(d) {
            const ctx = document.getElementById('routineChart').getContext('2d');
            const data = (dLogDB[d] || []).length;
            if(window.rtChart) window.rtChart.destroy();
            window.rtChart = new Chart(ctx, {
                type: 'line', data: { labels: (dLogDB[d]||[]).map(x=>x.time), datasets: [{label:'Activities', data: (dLogDB[d]||[]).map((_,i)=>i+1), borderColor:'#10b981', tension:0.4}] },
                options: { maintainAspectRatio: false }
            });
        }

        // STUDY LOGIC
        function addS() {
            const d = document.getElementById('mainDate').value; const h = parseFloat(document.getElementById('sHr').value);
            const sub = document.getElementById('sSub').value;
            if(!h) return; if(!sDB[d]) sDB[d] = [];
            const ex = sDB[d].find(s => s.subject === sub);
            if(ex) ex.hours += h; else sDB[d].push({subject: sub, hours: h});
            document.getElementById('sHr').value = ''; refresh();
        }
        function renderS(d) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (sDB[d] || []).forEach(s => l.innerHTML += `<div class="list-item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }
        function renderSubM() {
            const l = document.getElementById('subManage'); l.innerHTML = '';
            subs.forEach((s, i) => l.innerHTML += `<div class="list-item">${s} <span onclick="remSub(${i})" style="color:#ef4444; margin-left:auto; cursor:pointer; font-size:0.7rem;">REMOVE</span></div>`);
        }
        function remSub(i) { subs.splice(i, 1); refresh(); }
        function addNewSub() { const v = document.getElementById('newSub').value; if(v && !subs.includes(v)) { subs.push(v); document.getElementById('newSub').value=''; refresh(); } }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
