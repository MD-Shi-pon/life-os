<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Shipon Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAskdYkHhoxKH52icAEeqYaq2XRrmCcdBs",
        authDomain: "shipon-life-os.firebaseapp.com",
        projectId: "shipon-life-os",
        storageBucket: "shipon-life-os.firebasestorage.app",
        messagingSenderId: "957123699373",
        appId: "1:957123699373:web:b3c579ad5c2604cf6b5c24",
        measurementId: "G-F5HDLWS5WC"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.backupToCloud = async () => {
          const date = document.getElementById('mainDate').value;
          const data = {
              tasks: JSON.parse(localStorage.getItem('shipon_tasks'))?.[date] || [],
              study: JSON.parse(localStorage.getItem('shipon_study'))?.[date] || [],
              links: JSON.parse(localStorage.getItem('shipon_links')) || [],
              subjects: JSON.parse(localStorage.getItem('shipon_subjects')) || ["English", "Marketing"],
              syncTime: new Date()
          };
          try {
              await setDoc(doc(db, "users", "shipon", "history", date), data);
              alert("🚀 Sync Complete");
          } catch (e) { alert("Error: " + e.message); }
      };
    </script>

    <style>
        :root { 
            --p: #6366f1; --s: #10b981; --a: #f59e0b; 
            --glass: rgba(15, 23, 42, 0.7);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 120px;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh; overflow-x: hidden;
        }

        .page { display: none; padding: 25px; max-width: 480px; margin: 0 auto; animation: slideUp 0.5s ease; }
        .active-page { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 24px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 { font-weight: 800; font-size: 2rem; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }

        .stat-pill { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 800; display: block; }

        /* Hidden Graph Section */
        #graphSection { display: none; margin-top: 15px; }
        .toggle-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #94a3b8; padding: 8px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; margin-bottom: 10px; width: auto; }

        /* Focus Timer */
        .timer-display { font-size: 3.5rem; font-weight: 800; color: var(--a); margin: 15px 0; }

        input, select, button { width: 100%; padding: 16px; margin: 10px 0; border-radius: 20px; border: none; font-size: 1rem; font-weight: 600; outline: none; transition: 0.3s; }
        button { background: var(--p); color: white; cursor: pointer; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        button:active { transform: scale(0.95); }

        .item { display: flex; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .item span { flex: 1; margin-left: 15px; font-weight: 600; }
        .completed { opacity: 0.4; text-decoration: line-through; }

        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15,23,42,0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 10px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .nav-i { color: #64748b; font-size: 0.7rem; font-weight: 800; padding: 12px 20px; border-radius: 20px; cursor: pointer; }
        .nav-i.active { color: #fff; background: var(--p); }
    </style>
</head>
<body>

    <div id="homeP" class="page active-page">
        <h1>Life OS <span style="font-size: 0.8rem; vertical-align: middle; color: var(--s);">v2.0</span></h1>
        
        <div class="glass-card" style="text-align: center; border-color: var(--a);">
            <small style="text-transform: uppercase; letter-spacing: 2px; color: var(--a);">Lifetime Mastery</small>
            <div style="font-size: 4rem; font-weight: 800;" id="lifeH">0.0h</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="stat-pill"><small>Tasks</small><span class="stat-val" id="hT">0%</span></div>
            <div class="stat-pill"><small>Daily Score</small><span class="stat-val" style="color:var(--s)" id="hP">0</span></div>
        </div>

        <div class="glass-card" style="margin-top: 20px;">
            <button class="toggle-btn" onclick="toggleGraph()">📊 Show/Hide Progress Graph</button>
            <div id="graphSection"><canvas id="myChart"></canvas></div>
            <input type="date" id="mainDate" onchange="refresh()">
            <button onclick="backupToCloud()" style="background:var(--s)">☁️ Cloud Sync</button>
        </div>
    </div>

    <div id="tasksP" class="page">
        <h1>Focus Goals</h1>
        <div class="glass-card">
            <input type="text" id="tIn" placeholder="Enter priority task...">
            <button onclick="addT()">Add to List</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="studyP" class="page">
        <h1>Study Center</h1>
        <div class="glass-card" style="text-align: center;">
            <small>Deep Work Timer</small>
            <div class="timer-display" id="timer">25:00</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="startTimer()" style="background: var(--a)">Start</button>
                <button onclick="resetTimer()" style="background: #475569">Reset</button>
            </div>
        </div>
        
        <div class="glass-card">
            <select id="sSub"></select>
            <input type="number" id="sHr" placeholder="Manual Hours Entry" step="0.5">
            <button onclick="addS()" style="background:var(--p)">Log Session</button>
        </div>
        <div id="sLog"></div>
    </div>

    <div class="nav">
        <div class="nav-i active" id="nHome" onclick="nav('homeP')">Home</div>
        <div class="nav-i" id="nTasks" onclick="nav('tasksP')">Tasks</div>
        <div class="nav-i" id="nStudy" onclick="nav('studyP')">Study</div>
    </div>

    <script>
        let taskDB = JSON.parse(localStorage.getItem('s_t')) || {};
        let studyDB = JSON.parse(localStorage.getItem('s_s')) || {};
        let subs = ["English", "Marketing", "Development"];
        let timerInt;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
            document.getElementById('n' + id.replace('P','')).classList.add('active');
            refresh();
        }

        function toggleGraph() {
            const g = document.getElementById('graphSection');
            g.style.display = g.style.display === 'block' ? 'none' : 'block';
        }

        function startTimer() {
            clearInterval(timerInt);
            let time = 25 * 60;
            timerInt = setInterval(() => {
                let min = Math.floor(time / 60);
                let sec = time % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (time-- <= 0) { clearInterval(timerInt); alert("Session Done!"); }
            }, 1000);
        }

        function resetTimer() { clearInterval(timerInt); document.getElementById('timer').innerText = "25:00"; }

        function refresh() {
            const d = document.getElementById('mainDate').value || new Date().toISOString().split('T')[0];
            const dT = taskDB[d] || [];
            const dS = studyDB[d] || [];

            const done = dT.filter(t => t.done).length;
            const tPct = dT.length ? (done/dT.length)*100 : 0;
            document.getElementById('hT').innerText = Math.round(tPct) + "%";

            let hT = 0; dS.forEach(s => hT += s.hours);
            let tL = 0; Object.values(studyDB).forEach(day => day.forEach(s => tL += s.hours));
            document.getElementById('lifeH').innerText = tL.toFixed(1) + "h";

            const score = Math.round((tPct * 0.5) + (Math.min(hT/4, 1)*50));
            document.getElementById('hP').innerText = score;

            const sel = document.getElementById('sSub'); sel.innerHTML = '';
            subs.forEach(s => sel.innerHTML += `<option>${s}</option>`);

            renderT(d); renderS(d); updateChart();
            localStorage.setItem('s_t', JSON.stringify(taskDB));
            localStorage.setItem('s_s', JSON.stringify(studyDB));
        }

        function addT() {
            const d = document.getElementById('mainDate').value;
            const v = document.getElementById('tIn').value;
            if(!v) return;
            if(!taskDB[d]) taskDB[d] = [];
            taskDB[d].push({text: v, done: false});
            document.getElementById('tIn').value = ''; refresh();
        }

        function renderT(d) {
            const l = document.getElementById('tList'); l.innerHTML = '';
            (taskDB[d] || []).forEach((t, i) => {
                l.innerHTML += `<div class="item">
                    <input type="checkbox" ${t.done?'checked':''} onchange="toggleT('${d}',${i})">
                    <span class="${t.done?'completed':''}">${t.text}</span>
                </div>`;
            });
        }

        function toggleT(d, i) { taskDB[d][i].done = !taskDB[d][i].done; refresh(); }

        function addS() {
            const d = document.getElementById('mainDate').value;
            const h = parseFloat(document.getElementById('sHr').value);
            if(!h) return;
            if(!studyDB[d]) studyDB[d] = [];
            studyDB[d].push({subject: document.getElementById('sSub').value, hours: h});
            document.getElementById('sHr').value = ''; refresh();
        }

        function renderS(d) {
            const l = document.getElementById('sLog'); l.innerHTML = '';
            (studyDB[d] || []).forEach(s => l.innerHTML += `<div class="item"><b>${s.subject}</b>: ${s.hours}h</div>`);
        }

        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const labels = []; const data = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                const s = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString([],{weekday:'short'}));
                let h = 0; (studyDB[s]||[]).forEach(x => h+=x.hours);
                data.push(h);
            }
            if(window.chartO) window.chartO.destroy();
            window.chartO = new Chart(ctx, { 
                type:'line', data:{ labels, datasets:[{label:'Hours', data, borderColor:'#6366f1', tension:0.4, fill:true, backgroundColor:'rgba(99, 102, 241, 0.1)'}] }, 
                options:{plugins:{legend:{display:false}}, scales:{y:{display:false}, x:{ticks:{color:'#64748b'}}}} 
            });
        }

        document.getElementById('mainDate').valueAsDate = new Date();
        window.onload = refresh;
    </script>
</body>
</html>
